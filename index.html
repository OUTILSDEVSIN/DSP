const { createClient } = supabase;

// ── VÉRIFICATION VERSION SUPABASE ────────────────────────
async function checkVersionSync() {
  try {
    const { data, error } = await db.rpc('check_app_version', { version_live: APP_VERSION });
    if (error || !data) return;
    if (data.status === 'mismatch') {
      if (document.getElementById('version-banner')) return;
      const banner = document.createElement('div');
      banner.id = 'version-banner';
      banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:linear-gradient(135deg,#e74c3c,#c0392b);color:white;text-align:center;padding:10px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:12px';
      banner.innerHTML = '⚠️ Nouvelle version (v' + data.version_attendue + ') disponible.'
        + '<button onclick="localStorage.removeItem(\"dsp_version\"); window.location.href = window.location.pathname + \"?v=\" + Date.now()" style="background:white;color:#e74c3c;border:none;padding:4px 14px;border-radius:6px;cursor:pointer;font-weight:700;font-size:12px">🔄 Mettre à jour</button>'
        + '<button onclick="this.parentElement.remove()" style="background:rgba(255,255,255,0.2);color:white;border:none;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px">✕</button>';
      document.body.prepend(banner);

}

// ===== AUTH =====
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  const { data, error } = await db.auth.signInWithPassword({ email, password });
  if (error) { errEl.style.display = 'block'; return; }
  currentUser = data.user;
  await loadUserData();
}

async function loadUserData() {
  const { data } = await db.from('utilisateurs').select('*').eq('email', currentUser.email).single();
  if (!data) { showNotif('Utilisateur non trouvé dans la base.', 'error'); await db.auth.signOut(); return; }
  currentUserData = data;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('header-name').textContent = data.prenom + ' ' + data.nom;
  document.getElementById('header-role').textContent = data.role.toUpperCase();
  checkVersionSync();
  buildTabs();
  await loadAllUsers();
  showTab('dashboard');

  const btnReset = document.getElementById('btn-reset-header');
  if (btnReset) btnReset.style.display = ['admin','manager'].includes(data.role) ? '' : 'none';
}

async function doLogout() {
  await db.auth.signOut();

  document.getElementById('login-screen').style.display = 'flex';

// ===== CHANGER MOT DE PASSE =====
function showChangePassword() {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'pwd-modal';
  modal.innerHTML = `
    <div class="modal">
      <h2>🔑 Changer mon mot de passe</h2>
      <label>Nouveau mot de passe</label>
      <input type="password" id="new-pwd" placeholder="Minimum 6 caractères">
      <label>Confirmer le mot de passe</label>
      <input type="password" id="confirm-pwd" placeholder="Répétez le mot de passe">
      <div class="modal-error" id="pwd-error"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('pwd-modal')">Annuler</button>
        <button class="btn btn-primary" onclick="doChangePassword()">Enregistrer</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function doChangePassword() {
  const newPwd = document.getElementById('new-pwd').value;
  const confirmPwd = document.getElementById('confirm-pwd').value;
  const errEl = document.getElementById('pwd-error');
  errEl.style.display = 'none';
  if (newPwd.length < 6) { errEl.textContent = 'Le mot de passe doit contenir au moins 6 caractères.'; errEl.style.display = 'block'; return; }
  if (newPwd !== confirmPwd) { errEl.textContent = 'Les mots de passe ne correspondent pas.'; errEl.style.display = 'block'; return; }
  const { error } = await db.auth.updateUser({ password: newPwd });
  if (error) { errEl.textContent = 'Erreur : ' + error.message; errEl.style.display = 'block'; return; }
  closeModal('pwd-modal');
  showNotif('✅ Mot de passe modifié avec succès !', 'success');
}

function closeModal(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// ===== TABS =====
function buildTabs() {
  const role = currentUserData.role;
  const tabs = [{ id: 'dashboard', label: '📊 Tableau de bord' }];
  if (role === 'admin' || role === 'manager') tabs.push({ id: 'import', label: '📂 Importer Excel' });
  if (role === 'admin' || role === 'manager') tabs.push({ id: 'attribution', label: '📋 Attribution' });
  tabs.push({ id: 'mesdossiers', label: '📁 Mes dossiers' });
  if (role === 'admin' || role === 'manager') tabs.push({ id: 'utilisateurs', label: '👥 Équipe' });
  const container = document.getElementById('tabs-container');
  container.innerHTML = tabs.map(t =>
    `<div class="tab" id="tab-${t.id}" onclick="showTab('${t.id}')">${t.label}</div>`
  ).join('');
}

function showTab(id) {
  currentTab = id;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const el = document.getElementById('tab-' + id);
  if (el) el.classList.add('active');
  if (id === 'dashboard') renderDashboard();
  else if (id === 'import') renderImport();
  else if (id === 'attribution') renderAttribution();
  else if (id === 'mesdossiers') renderMesDossiers();
  else if (id === 'utilisateurs') renderUtilisateurs();
}

async function loadAllUsers() {

async function loadDossiers() {

// ── T2 — LIBÉRER UN GESTIONNAIRE ─────────────────────────────────
function showReleaseManager(nom) {
  const dossiers = allDossiers.filter(d => d.gestionnaire === nom && !d.traite);
  const modal = document.createElement('div');
  modal.className = 'modal-overlay'; modal.id = 'release-modal';
  const inner = document.createElement('div'); inner.className = 'modal';
  inner.style.cssText = 'text-align:center;max-width:440px';
  inner.innerHTML = '<div style="font-size:44px;margin-bottom:12px">🔓</div>'
    + '<h2 style="color:#e74c3c">Libérer ' + nom + ' ?</h2>'
    + '<p style="color:#666;margin:16px 0">Cette action va libérer <strong>' + dossiers.length + ' dossier(s) non traité(s)</strong> et les remettre disponibles.</p>'
    + (dossiers.length === 0 ? '<p style="color:#27ae60;font-weight:600">✅ Aucun dossier non traité à libérer.</p>' : '');
  const btns = document.createElement('div');
  btns.style.cssText = 'display:flex;gap:10px;justify-content:center;margin-top:20px';
  const btnC = document.createElement('button'); btnC.className = 'btn btn-secondary'; btnC.textContent = 'Annuler';
  btnC.onclick = () => closeModal('release-modal');
  btns.appendChild(btnC);
  if (dossiers.length > 0) {
    const btnO = document.createElement('button'); btnO.className = 'btn btn-danger';
    btnO.textContent = '🔓 Confirmer la libération';
    btnO.onclick = () => doReleaseManager(nom);
    btns.appendChild(btnO);
  }
  inner.appendChild(btns); modal.appendChild(inner); document.body.appendChild(modal);
}

async function doReleaseManager(nom) {
  closeModal('release-modal');
  const dossiers = allDossiers.filter(d => d.gestionnaire === nom && !d.traite);
  let ok = 0;
  for (const d of dossiers) {
    const { error } = await db.from('dossiers').update({ gestionnaire: '', verrouille: false, statut: 'non_attribue' }).eq('id', d.id);
    if (!error) ok++;
  }
  showNotif('🔓 ' + ok + ' dossier(s) libéré(s) pour ' + nom, 'success');
  await loadDossiers(); renderDashboard();
}

function renderImport() {
  document.getElementById('main-content').innerHTML = `
    <div class="upload-zone" onclick="document.getElementById('file-input').click()">
      <div class="icon">📂</div>
      <h3>Cliquez pour importer un fichier Excel</h3>
      <p>Formats acceptés : .xlsx, .xls</p>
    </div>
    <input type="file" id="file-input" accept=".xlsx,.xls" onchange="handleFile(event)">
    <div id="import-result"></div>`;
}

function detectPortefeuille(refContrat) {
  const r = (refContrat || '').toUpperCase();
  if (r.includes('OPTI')) return 'OPTINEO';
  return 'MIA';
}

function detectType(refContrat) {
  const r = (refContrat || '').toUpperCase();
  if (r.includes('MRH')) return 'Habitation';
  return 'Auto';
}

async function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const workbook = XLSX.read(e.target.result, { type: 'array' });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
    if (!rows.length) { showNotif('Fichier vide ou format incorrect.', 'error'); return; }

    // Normalisation des clés : on crée une map clé_normalisée -> clé_originale
    const firstRow = rows[0];
    const normalize = s => String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]/g, '');
    const keyMap = {};
    Object.keys(firstRow).forEach(k => { keyMap[normalize(k)] = k; });

    const get = (r, ...candidates) => {
      for (const c of candidates) {
        const norm = normalize(c);
        if (keyMap[norm] !== undefined && r[keyMap[norm]] !== undefined && r[keyMap[norm]] !== '') {
          return String(r[keyMap[norm]]).trim();
        }
      }
      return '';
    };

    console.log('Colonnes Excel détectées:', Object.keys(firstRow));

    document.getElementById('import-result').innerHTML = '<div class="loading">Import en cours...</div>';

    const mapped = rows.map(r => ({
      ref_sinistre: get(r, 'Ref sinistre', 'Réf. sinistre', 'Ref. sinistre', 'REF SINISTRE', 'ref_sinistre'),
      ref_contrat: get(r, 'Ref contrat', 'Réf. contrat', 'Ref. contrat', 'REF CONTRAT', 'ref_contrat'),
      nature: get(r, 'Nature MIN', 'Nature', 'nature', 'NATURE'),
      nature_label: get(r, 'Desc. Nature', 'Nature', 'Nature label', 'nature_label', 'Libellé nature'),
      type: detectType(get(r, 'Ref contrat', 'Réf. contrat', 'Ref. contrat', 'REF CONTRAT', 'ref_contrat')),
      portefeuille: detectPortefeuille(get(r, 'Ref contrat', 'Réf. contrat', 'Ref. contrat', 'REF CONTRAT', 'ref_contrat')),
      gestionnaire: '',
      traite: false,
      verrouille: false
    })).filter(d => d.ref_sinistre);

    console.log(`Lignes mappées: ${mapped.length}`, mapped[0]);

    if (!mapped.length) {
      showNotif('Aucune ligne valide trouvée. Vérifiez les noms de colonnes.', 'error');
      document.getElementById('import-result').innerHTML = '';
      return;
    }

    const { error } = await db.from('dossiers').insert(mapped);
    if (error) { showNotif('Erreur import : ' + error.message, 'error'); return; }
    showNotif('✅ ' + mapped.length + ' dossiers importés. Données personnelles non conservées (RGPD).', 'success');
    document.getElementById('import-result').innerHTML =
      `<div class="stat-card" style="max-width:300px"><div class="number" style="color:#27ae60">${mapped.length}</div><div class="label">Dossiers importés</div></div>`;
    await loadDossiers();
    await loadAllUsers();
    showAutoAssignModal(mapped.length);
  };
  reader.readAsArrayBuffer(file);
}

async function doAutoAssign(totalImported) {
  const checks = [...document.querySelectorAll('.gest-check:checked')];
  if (!checks.length) {
    const err = document.getElementById('auto-assign-error');
    err.textContent = 'Sélectionnez au moins un gestionnaire.';
    err.style.display = 'block'; return;
  }
  const selections = checks.map(cb => ({
    nom: cb.dataset.nom,
    nb: parseInt(document.querySelector(`.gest-nb[data-nom="${cb.dataset.nom}"]`).value) || 10
  }));
  const totalDemande = selections.reduce((s, x) => s + x.nb, 0);
  const dossiersNonAttribues = allDossiers.filter(d => !d.gestionnaire);
  const disponibles = dossiersNonAttribues.length;
  if (totalDemande > disponibles) {
    const parGest = Math.floor(disponibles / selections.length);
    const err = document.getElementById('auto-assign-error');
    err.innerHTML = `⚠️ Vous demandez <strong>${totalDemande}</strong> dossiers mais il n'en reste que <strong>${disponibles}</strong> non attribués.<br><br>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:8px">
        <button class="btn btn-secondary" onclick="document.getElementById('auto-assign-error').style.display='none'">✏️ Modifier</button>
        <button class="btn btn-warning" onclick="doAutoAssignEquitable(${disponibles})">⚖️ Répartir équitablement (${parGest} chacun)</button>
      </div>`;
    err.style.display = 'block'; return;
  }
  await executeAutoAssign(selections, dossiersNonAttribues);
}

async function doAutoAssignEquitable(disponibles) {
  const checks = [...document.querySelectorAll('.gest-check:checked')];
  const nb = Math.floor(disponibles / checks.length);
  const selections = checks.map(cb => ({ nom: cb.dataset.nom, nb }));
  const dossiers = allDossiers.filter(d => !d.gestionnaire);
  await executeAutoAssign(selections, dossiers);
}

async function executeAutoAssign(selections, dossiers) {
  let idx = 0;
  for (const sel of selections) {
    const batch = dossiers.slice(idx, idx + sel.nb);
    for (const d of batch) {
      await db.from('dossiers').update({ gestionnaire: sel.nom }).eq('id', d.id);
    }
    idx += sel.nb;
  }
  closeModal('auto-assign-modal');
  showNotif(`✅ ${idx} dossiers attribués automatiquement !`, 'success');
  await loadDossiers();
  showTab('attribution');
}

  const modal = document.createElement('div');
  modal.className = 'dispatch-modal-overlay';
  modal.id = 'dispatch-modal';
  modal.innerHTML = `

      <div class="dispatch-actions">
        <button class="btn btn-secondary" style="padding:12px 28px" onclick="closeModal('dispatch-modal')">Annuler</button>
        <button class="btn-dispatch" onclick="doDispatch(${verrouilles.length})">🚀 DISPATCHER</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function doDispatch(count) {
  closeModal('dispatch-modal');
  const verrouilles = allDossiers.filter(d => d.verrouille && d.statut !== 'attribue' && d.statut !== 'en_cours' && d.statut !== 'ouvert' && d.statut !== 'traite');
  const ids = verrouilles.map(d => d.id);
  for (const id of ids) {
    await db.from('dossiers').update({ statut: 'attribue' }).eq('id', id);
  }
  showNotif(`🚀 ${count} dossiers dispatchés avec succès !`, 'success');
  await loadDossiers();
  renderAttribution();
}

// ===== COPIER REFERENCE =====
async function copyRef(ref, dossierstatut, id, btn) {
  // Si un dossier est "en_cours", le passer en "ouvert"
  if (dossierstatut === 'en_cours') {
    const enCours = allDossiers.find(d => d.statut === 'en_cours' && d.id !== id);
    if (enCours) {
      await db.from('dossiers').update({ statut: 'ouvert' }).eq('id', enCours.id);
      allDossiers = allDossiers.map(d => d.id === enCours.id ? {...d, statut: 'ouvert'} : d);
    }
  }
  // Passer ce dossier en "en_cours"
  await db.from('dossiers').update({ statut: 'en_cours' }).eq('id', id);
  allDossiers = allDossiers.map(d => d.id === id ? {...d, statut: 'en_cours'} : d);
  // Copier dans le presse-papiers
  navigator.clipboard.writeText(ref).then(() => {
    btn.textContent = '✅'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋'; btn.classList.remove('copied'); }, 2000);
  });
}

function statutBadge(statut) {
  const map = {
    'non_attribue': ['badge-non_attribue', '⚪ Non attribué'],
    'attribue':    ['badge-attribue',    '🔵 Attribué'],
    'en_cours':    ['badge-en_cours',    '🟠 En cours'],
    'ouvert':      ['badge-ouvert',      '🔴 Ouvert'],
    'traite':      ['badge-traite2',     '✅ Traité'],
  };
  const [cls, label] = map[statut] || map['non_attribue'];
  return `<span class="badge ${cls}">${label}</span>`;
}

function showEditUser(id, prenom, nom, email, role) {
  const isSelf = currentUserData.email === email;

  const opts = roles.map(r => '<option value="' + r + '"' + (role===r?' selected':'') + '>' + r.charAt(0).toUpperCase()+r.slice(1) + '</option>').join('');

  modal.className = 'modal-overlay'; modal.id = 'edit-user-modal';
  const inner = document.createElement('div'); inner.className = 'modal';
  inner.innerHTML = '<h2 style="color:#1e3a5f;margin-bottom:20px">✏️ Modifier le profil</h2>'
    + '<div class="form-group"><label>Prénom</label><input type="text" id="edit-prenom" value="' + prenom + '"></div>'
    + '<div class="form-group"><label>Nom</label><input type="text" id="edit-nom" value="' + nom + '"></div>'

    + '<div class="form-group"><label>Rôle</label><select id="edit-role"' + (isSelf?' disabled title="Impossible de modifier votre propre rôle"':'') + '>' + opts + '</select>'
    + (isSelf ? '<small style="color:#e74c3c">Vous ne pouvez pas changer votre propre rôle.</small>' : '') + '</div>'
    + '<div class="modal-error" id="edit-user-error"></div>'
    + '';
  const editBtns = document.createElement('div'); editBtns.className = 'modal-actions';
  const editBtnC = document.createElement('button'); editBtnC.className = 'btn btn-secondary';
  editBtnC.textContent = 'Annuler'; editBtnC.onclick = () => closeModal('edit-user-modal');
  const editBtnO = document.createElement('button'); editBtnO.className = 'btn btn-primary';
  editBtnO.textContent = 'Enregistrer'; editBtnO.onclick = () => doEditUser(id, email, isSelf);
  editBtns.appendChild(editBtnC); editBtns.appendChild(editBtnO);
  inner.appendChild(editBtns); modal.appendChild(inner); document.body.appendChild(modal);
}


async function doEditUser(id, originalEmail, isSelf) {
  const prenom = document.getElementById('edit-prenom').value.trim();
  const nom = document.getElementById('edit-nom').value.trim();
  const email = document.getElementById('edit-email').value.trim();
  const errEl = document.getElementById('edit-user-error');
  errEl.style.display = 'none';
  if (!prenom || !nom || !email) { errEl.textContent = 'Tous les champs sont requis.'; errEl.style.display = 'block'; return; }
  const updates = { prenom, nom, email };
  if (!isSelf) updates.role = document.getElementById('edit-role').value;
  const { error } = await db.from('utilisateurs').update(updates).eq('id', id);
  if (error) { errEl.textContent = 'Erreur : ' + error.message; errEl.style.display = 'block'; return; }
  closeModal('edit-user-modal');
  showNotif('✅ Profil mis à jour !', 'success');
  await loadAllUsers(); renderUtilisateurs();
}

  const role = currentUserData.role;
  const roleOptions = role === 'admin'
    ? '<option value="gestionnaire">Gestionnaire</option><option value="manager">Manager</option><option value="admin">Admin</option>'
    : '<option value="gestionnaire">Gestionnaire</option>';

  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'add-user-modal';
  modal.innerHTML = `
    <div class="modal">
      <h2>➕ Ajouter un membre</h2>
      <label>Prénom</label><input type="text" id="new-prenom" placeholder="Prénom">
      <label>Nom</label><input type="text" id="new-nom" placeholder="Nom">
      <label>Email</label><input type="email" id="new-email" placeholder="email@entreprise.fr">
      <label>Mot de passe provisoire</label><input type="text" id="new-password" placeholder="Minimum 6 caractères">
      <label>Rôle</label>
      <select id="new-role">${roleOptions}</select>
      <div class="modal-error" id="add-user-error"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('add-user-modal')">Annuler</button>
        <button class="btn btn-success" onclick="doAddUser()">Créer le compte</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function doAddUser() {
  const prenom = document.getElementById('new-prenom').value.trim();
  const nom = document.getElementById('new-nom').value.trim();
  const email = document.getElementById('new-email').value.trim();
  const password = document.getElementById('new-password').value;
  const role = document.getElementById('new-role').value;
  const errEl = document.getElementById('add-user-error');
  errEl.style.display = 'none';

  if (!prenom || !nom || !email || !password) {
    errEl.textContent = 'Veuillez remplir tous les champs.'; errEl.style.display = 'block'; return;
  }
  if (password.length < 6) {
    errEl.textContent = 'Le mot de passe doit contenir au moins 6 caractères.'; errEl.style.display = 'block'; return;
  }

  // Créer dans Supabase Auth via Admin API (signUp)
  const { data, error } = await db.auth.signUp({ email, password });
  if (error) { errEl.textContent = 'Erreur Auth : ' + error.message; errEl.style.display = 'block'; return; }

  // Ajouter dans la table utilisateurs
  const { error: dbError } = await db.from('utilisateurs').insert({ prenom, nom, email, role, actif: true });
  if (dbError) { errEl.textContent = 'Erreur base de données : ' + dbError.message; errEl.style.display = 'block'; return; }

  closeModal('add-user-modal');
  showNotif(`✅ Compte créé pour ${prenom} ${nom} !`, 'success');
  await loadAllUsers();
  renderUtilisateurs();
}

// ===== ACTIONS =====

// ── SÉLECTION & VERROUILLAGE ──────────────────────────────
function updateSelectionCount() {
  const n = document.querySelectorAll('.row-check:checked').length;
  const el = document.getElementById('selection-count');
  if (el) el.textContent = n + ' sélectionné(s)';
}

function toggleAll(checked) {
  document.querySelectorAll('.row-check').forEach(cb => cb.checked = checked);
  updateSelectionCount();
}

function selectAll() {
  document.querySelectorAll('.row-check').forEach(cb => cb.checked = true);
  const all = document.getElementById('check-all');
  if (all) all.checked = true;
  updateSelectionCount();
}

function clearSelection() {
  document.querySelectorAll('.row-check').forEach(cb => cb.checked = false);
  const all = document.getElementById('check-all');
  if (all) all.checked = false;
  updateSelectionCount();
}

async function lockSelection() {
  const ids = [...document.querySelectorAll('.row-check:checked')].map(cb => parseInt(cb.dataset.id));
  if (!ids.length) { showNotif('Sélectionnez au moins un dossier.', 'error'); return; }
  const gestionnaire = document.getElementById('assign-bulk-select')?.value || '';
  const sansGest = ids.filter(id => { const d = allDossiers.find(x => x.id === id); return !gestionnaire && !(d && d.gestionnaire); });
  if (sansGest.length > 0) {
    const gests = allUsers.filter(u => ['gestionnaire','manager','admin'].includes(u.role));
    const modal = document.createElement('div');
    modal.className = 'modal-overlay'; modal.id = 'lock-warn-modal';
    // Construire la modale sans guillemets imbriqués
    const inner = document.createElement('div');
    inner.className = 'modal';
    inner.style.cssText = 'text-align:center;max-width:420px';
    inner.innerHTML = '<div style="font-size:44px;margin-bottom:12px">&#9888;&#65039;</div>'
      + '<h2 style="color:#e74c3c">Gestionnaire manquant</h2>'
      + '<p style="color:#666;margin:14px 0"><strong>' + sansGest.length + '</strong> dossier(s) sans gestionnaire.<br>Selectionnez-en un avant de verrouiller.</p>';
    const sel = document.createElement('select');
    sel.id = 'lock-warn-select'; sel.className = 'filter-select';
    sel.style.cssText = 'width:100%;margin-bottom:20px';
    sel.innerHTML = '<option value="">— Choisir un gestionnaire —</option>'
      + gests.map(g => { const n = g.prenom + ' ' + g.nom; return '<option value="' + n + '">' + n + ' (' + g.role + ')</option>'; }).join('');
    inner.appendChild(sel);
    const btns = document.createElement('div');
    btns.style.cssText = 'display:flex;gap:10px;justify-content:center';
    const btnCancel = document.createElement('button');
    btnCancel.className = 'btn btn-secondary'; btnCancel.textContent = 'Annuler';
    btnCancel.onclick = () => closeModal('lock-warn-modal');
    const btnOk = document.createElement('button');
    btnOk.className = 'btn btn-warning'; btnOk.textContent = '🔒 Verrouiller';
    btnOk.onclick = () => confirmLockWithGest(ids);
    btns.appendChild(btnCancel); btns.appendChild(btnOk);
    inner.appendChild(btns);
    modal.appendChild(inner);
    document.body.appendChild(modal); return;
  }
  await executeLock(ids, gestionnaire);
}

async function confirmLockWithGest(ids) {
  const gestionnaire = document.getElementById('lock-warn-select')?.value;
  if (!gestionnaire) { showNotif('Veuillez sélectionner un gestionnaire.', 'error'); return; }
  closeModal('lock-warn-modal');
  await executeLock(ids, gestionnaire);
}

async function executeLock(ids, gestionnaire) {
  for (const id of ids) {
    const upd = { verrouille: true };
    if (gestionnaire) upd.gestionnaire = gestionnaire;
    await db.from('dossiers').update(upd).eq('id', id);
  }
  showNotif('🔒 ' + ids.length + ' dossier(s) verrouillé(s)' + (gestionnaire ? ' et attribués à ' + gestionnaire : '') + '.', 'success');
  clearSelection();
  await loadDossiers();
  renderAttribution();
}

async function unlockSelection() {
  const ids = [...document.querySelectorAll('.row-check:checked')].map(cb => parseInt(cb.dataset.id));
  if (!ids.length) { showNotif('Sélectionnez au moins un dossier.', 'error'); return; }
  for (const id of ids) {
    await db.from('dossiers').update({ verrouille: false }).eq('id', id);
  }
  showNotif(`🔓 ${ids.length} dossier(s) déverrouillé(s).`, 'info');
  clearSelection();
  await loadDossiers();
  renderAttribution();
}

async function toggleVerrouille(id, checked) {
  const dossier = allDossiers.find(d => d.id === id);
  const statut = dossier?.statut || 'non_attribue';
  const isDispatched = ['attribue','encours','ouvert','traite'].includes(statut);

  // Si on veut déverrouiller un dossier dispatché → seul manager
  if (!checked && isDispatched && !isManager) {
    showNotif('Seul le manager peut déverrouiller un dossier dispatché.', 'error');
    renderAttribution(); return;
  }

  if (!checked && isDispatched && isManager) {
    showUnlockConfirm(id);
    renderAttribution(); return;
  }

  const { error } = await db.from('dossiers').update({ verrouille: checked }).eq('id', id);
  if (error) { showNotif('Erreur.', 'error'); return; }
  allDossiers = allDossiers.map(d => d.id === id ? {...d, verrouille: checked} : d);
  showNotif(checked ? '🔒 Dossier verrouillé' : '🔓 Dossier déverrouillé', 'info');
  // Mettre à jour le compteur dispatch
  const nbVerrouilles = allDossiers.filter(d => d.verrouille && !['attribue','encours','ouvert','traite'].includes(d.statut||'non_attribue')).length;
  const btn = document.querySelector('.btn-dispatch');
  if (btn) { btn.disabled = nbVerrouilles === 0; btn.textContent = `🚀 DISPATCHER${nbVerrouilles > 0 ? ` (${nbVerrouilles})` : ''}`; }
}

function showUnlockConfirm(id) {
  const existing = document.getElementById('unlock-confirm-modal');
  if (existing) existing.remove();
  const d = allDossiers.find(x => x.id === id);
  const gname = d && d.gestionnaire ? ' (attribué à <strong>' + d.gestionnaire + '</strong>)' : '';
  const modal = document.createElement('div');
  modal.className = 'modal-overlay'; modal.id = 'unlock-confirm-modal';
  const inner = document.createElement('div');
  inner.className = 'modal'; inner.style.cssText = 'text-align:center;max-width:420px';
  inner.innerHTML = '<div style="font-size:44px;margin-bottom:12px">🔓</div>'
    + '<h2 style="color:#e74c3c">Libérer ce dossier ?</h2>'
    + '<p style="color:#666;margin:16px 0">Cette action va <strong>désattribuer</strong> le dossier' + gname + ' et remettre son statut à <strong>Non attribué</strong>.</p>';
  const btns = document.createElement('div');
  btns.style.cssText = 'display:flex;gap:10px;justify-content:center;margin-top:20px';
  const btnC = document.createElement('button'); btnC.className = 'btn btn-secondary'; btnC.textContent = 'Annuler';
  btnC.onclick = () => closeModal('unlock-confirm-modal');
  const btnO = document.createElement('button'); btnO.className = 'btn btn-danger'; btnO.textContent = '🔓 Confirmer la libération';
  btnO.onclick = () => confirmUnlock(id);
  btns.appendChild(btnC); btns.appendChild(btnO); inner.appendChild(btns); modal.appendChild(inner);
  document.body.appendChild(modal);
}

async function confirmUnlock(id) {
  closeModal('unlock-confirm-modal');
  const { error } = await db.from('dossiers').update({ verrouille: false, gestionnaire: '', statut: 'non_attribue' }).eq('id', id);
  if (error) { showNotif('Erreur lors du déverrouillage.', 'error'); return; }
  showNotif('🔓 Dossier déverrouillé et désattribué.', 'success');
  await loadDossiers();
  renderAttribution();
}

async function assignDossier(id, gestionnaire) {
  const { error } = await db.from('dossiers').update({ gestionnaire }).eq('id', id);
  if (error) { showNotif('Erreur lors de l\'attribution.', 'error'); return; }
  showNotif(gestionnaire ? `Dossier attribué à ${gestionnaire}` : 'Attribution annulée', 'success');
  allDossiers = allDossiers.map(d => d.id === id ? {...d, gestionnaire} : d);
}

async function toggleTraite(id, checked, gestionnaire) {
  const monNom = currentUserData.prenom + ' ' + currentUserData.nom;
  const isManager = ['admin','manager'].includes(currentUserData.role);
  if (!isManager && gestionnaire !== monNom) {
    showNotif('Vous ne pouvez cocher que vos propres dossiers.', 'error');
    renderAttribution(); return;
  }
  // TICKET 5 – Gestionnaire ne peut pas décocher Traité
  if (!checked && !isManager) {
    showNotif('Seul le manager peut réinitialiser un dossier traité.', 'error');
    renderAttribution(); return;
  }
  const newStatut = checked ? 'traite' : 'ouvert';
  const { error } = await db.from('dossiers').update({ traite: checked, statut: newStatut }).eq('id', id);
  if (error) { showNotif('Erreur.', 'error'); return; }
  showNotif(checked ? '✅ Dossier marqué traité' : '↩️ Dossier remis en cours', 'success');
  allDossiers = allDossiers.map(d => d.id === id ? {...d, traite: checked, statut: newStatut} : d);
}

// ===== RESET =====
function showReset() {
  if (!['admin','manager'].includes(currentUserData.role)) {
    showNotif('Accès refusé.', 'error'); return;
  }
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'reset-modal';
  modal.innerHTML = `
    <div class="modal" style="text-align:center">
      <div style="font-size:52px;margin-bottom:12px">🗑️</div>
      <h2 style="color:#e74c3c">Remise à zéro</h2>
      <p style="color:#666;margin:16px 0">Cette action va <strong>supprimer définitivement tous les dossiers</strong> importés.<br>Cette opération est irréversible.</p>
      <p style="background:#fff5f5;border-radius:8px;padding:12px;color:#e74c3c;font-weight:600;font-size:13px">
        ⚠️ Tous les dossiers seront effacés
      </p>
      <div class="modal-actions" style="justify-content:center;margin-top:24px">
        <button class="btn btn-secondary" onclick="closeModal('reset-modal')">Annuler</button>
        <button class="btn btn-danger" onclick="doReset()">🗑️ Confirmer la remise à zéro</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function doReset() {
  closeModal('reset-modal');
  const { error } = await db.from('dossiers').delete().neq('id', 0);
  if (error) { showNotif('Erreur lors de la remise à zéro : ' + error.message, 'error'); return; }
  allDossiers = [];
  showNotif('✅ Plateforme remise à zéro avec succès !', 'success');
  renderDashboard();
}

// ===== NOTIF =====

  // ===== T10 — DOSSIER SUPPLÉMENTAIRE =====
  async function demanderDossierSupp() {
    const monNom = currentUserData.prenom + ' ' + currentUserData.nom;
    const nonTraites = allDossiers.filter(function(d) { return d.gestionnaire === monNom && !d.traite; });
    if (nonTraites.length > 0) {
      const ov = document.createElement('div'); ov.className = 'modal-overlay'; ov.id = 'supp-blocked-modal';
      const bx = document.createElement('div'); bx.className = 'modal'; bx.style.cssText = 'text-align:center;max-width:400px';
      bx.innerHTML = '<div style="font-size:52px;margin-bottom:12px">🐌</div><h2 style="color:#e74c3c">Pas trop vite !</h2>'
        + '<p style="color:#666;margin:16px 0">Tu as encore <strong>' + nonTraites.length + ' dossier(s) non trait&eacute;(s)</strong>.<br>Termine tes dossiers avant d&#39;en demander un nouveau !</p>'
        + '<div id="sbtn" style="margin-top:20px"></div>';
      ov.appendChild(bx); document.body.appendChild(ov);
      const bc = document.createElement('button'); bc.className = 'btn btn-secondary'; bc.textContent = 'OK, compris !'; bc.style.width = '100%';
      bc.onclick = function() { closeModal('supp-blocked-modal'); };
      document.getElementById('sbtn').appendChild(bc);
      return;
    }
    const dispo = allDossiers.filter(function(d) { return !d.gestionnaire && !d.verrouille && d.statut === 'nonattribue'; });
    if (dispo.length === 0) { showNotif('Aucun dossier disponible.', 'error'); return; }
    const ov = document.createElement('div'); ov.className = 'modal-overlay'; ov.id = 'supp-confirm-modal';
    const bx = document.createElement('div'); bx.className = 'modal'; bx.style.cssText = 'text-align:center;max-width:400px';
    bx.innerHTML = '<div style="font-size:52px;margin-bottom:12px">📋</div><h2 style="color:#1e3a5f">Demander un dossier ?</h2>'
      + '<p style="color:#666;margin:16px 0">Il reste <strong>' + dispo.length + ' dossier(s) disponible(s)</strong>.<br>Un dossier va vous &ecirc;tre attribu&eacute; automatiquement.</p>'
      + '<div id="scbtn" style="display:flex;gap:10px;justify-content:center;margin-top:20px"></div>';
    ov.appendChild(bx); document.body.appendChild(ov);
    const bA = document.createElement('button'); bA.className = 'btn btn-secondary'; bA.textContent = 'Annuler';
    bA.onclick = function() { closeModal('supp-confirm-modal'); };
    const bC = document.createElement('button'); bC.className = 'btn btn-success'; bC.textContent = 'Confirmer'; bC.onclick = confirmerDossierSupp;
    const d = document.getElementById('scbtn'); d.appendChild(bA); d.appendChild(bC);
  }
  async function confirmerDossierSupp() {
    closeModal('supp-confirm-modal');
    const monNom = currentUserData.prenom + ' ' + currentUserData.nom;
    const dispo = allDossiers.filter(function(d) { return !d.gestionnaire && !d.verrouille && d.statut === 'nonattribue'; });
    if (dispo.length === 0) { showNotif('Aucun dossier disponible.', 'error'); return; }
    const { error } = await db.from('dossiers').update({ gestionnaire: monNom, statut: 'attribue', verrouille: true, demande_supp: true }).eq('id', dispo[0].id);
    if (error) { showNotif('Erreur : ' + error.message, 'error'); return; }
    showNotif('Nouveau dossier attribué !', 'success');
    await loadDossiers(); renderMesDossiers();
  }
  // ===== FIN T10 =====
function showNotif(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `notif notif-${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ===== INIT =====
db.auth.getSession().then(({ data }) => {
  if (data.session) { currentUser = data.session.user; loadUserData(); }
});
</script>
