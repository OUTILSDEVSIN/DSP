name: Apply Dvol Patch

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore original index.html
        run: |
          git show 006a5f3985a47701b3ab64e5b4d92a774586b026:staging/index.html > staging/index.html
          echo "Restauré depuis commit 006a5f39"
          wc -c staging/index.html

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Apply Dvol patch
        run: |
          cd staging
          node patch_dvol.js
          wc -c index.html
          grep -c "dvol-screen" index.html && echo "dvol-screen OK"
          grep -c "btn-tool-dvol" index.html && echo "btn-tool-dvol OK"
          grep -c "dvolScreenInit" index.html && echo "dvolScreenInit OK"

      - name: Commit result
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add staging/index.html
          git commit -m "feat: apply Dvol patch to staging/index.html v2.5.53"
          git push
