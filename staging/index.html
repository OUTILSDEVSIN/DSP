<!DOCTYPE html>
<html>
<head>
  <title>Test Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Test connexion</h1>
  <input id="email" placeholder="email" />
  <input id="pwd" type="password" placeholder="mot de passe" />
  <button onclick="testLogin()">Connexion</button>
  <div id="result"></div>

  <script>
    const SUPABASE_URL = 'https://eqyqcslfvcyxdgjhvmry.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // ta clé anon
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function testLogin() {
      const email = document.getElementById('email').value;
      const pwd = document.getElementById('pwd').value;
      const result = document.getElementById('result');

      const { data, error } = await supabase.auth.signInWithPassword({ email, password: pwd });
      
      if (error) {
        result.innerHTML = '<p style="color:red">' + error.message + '</p>';
      } else {
        result.innerHTML = '<p style="color:green">✅ Connecté ! User ID: ' + data.user.id + '</p>';
        
        // Test table utilisateurs
        const { data: userData, error: userError } = await supabase
          .from('utilisateurs')
          .select('*, last_password_change')
          .eq('email', email)
          .single();
          
        if (userError) {
          result.innerHTML += '<p style="color:orange">Erreur utilisateurs: ' + userError.message + '</p>';
        } else {
          result.innerHTML += '<p>last_password_change: ' + (userData.last_password_change || 'NULL') + '</p>';
        }
      }
    }
  </script>
</body>
</html>
