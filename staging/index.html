<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dispatchis</title>
  <meta name="copyright" content="© Dispatchis — Tous droits réservés">
  <meta name="version" content="2.5.41">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  /* ===== TOKENS ===== */
  :root {
    --navy:       #1B3461;
    --navy-light: #2A4A7F;
    --brand-blue: #4A7EC7;
    --rose:       #e5195e;
    --rose-light: #fce8ef;
    --gray-bg:    #f4f5f7;
    --gray-100:   #f8f9fa;
    --gray-200:   #eef0f3;
    --gray-300:   #e0e3e8;
    --gray-400:   #b0b8c5;
    --gray-600:   #6b7689;
    --gray-800:   #2c3547;
    --white:      #ffffff;
    --shadow-sm:  0 1px 3px rgba(15,27,45,0.07);
    --shadow-md:  0 4px 16px rgba(15,27,45,0.10);
    --radius-sm:  6px;
    --radius-md:  10px;
    --radius-lg:  14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--gray-bg); min-height: 100vh; color: var(--navy); font-size: 14px; }

  /* ===== LOGIN ===== */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  /* ===== LOGIN iOS STYLE ===== */
  #login-screen {
    background: linear-gradient(135deg, #dce8f8 0%, #eaf1fb 40%, #e4edf8 100%);
    position: relative; overflow: hidden;
  }
  #login-screen::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(27,52,97,0.14) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(74,126,199,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 60% 80%, rgba(42,74,127,0.10) 0%, transparent 50%);
    pointer-events: none;
  }
  .login-box {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(28px) saturate(1.6);
    -webkit-backdrop-filter: blur(28px) saturate(1.6);
    border: 1px solid rgba(229,25,94,0.15);
    border-radius: 28px;
    padding: 48px 44px 40px;
    width: 400px;
    box-shadow: 0 8px 40px rgba(229,25,94,0.10), 0 2px 8px rgba(0,0,0,0.06);
    position: relative;
    animation: loginFadeIn 0.5s cubic-bezier(.22,1,.36,1);
  }
  @keyframes loginFadeIn {
    from { opacity:0; transform: translateY(24px) scale(0.97); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }
  .login-logo { display: flex; flex-direction: column; align-items: center; margin-bottom: 10px; }
  .login-logo-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, #1B3461, #2A5298);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; font-weight: 900; color: white;
    letter-spacing: -1px;
    box-shadow: 0 8px 32px rgba(232,18,81,0.45);
    margin-bottom: 16px;
  }
  .login-logo-name {
    font-size: 26px; font-weight: 800; letter-spacing: -0.8px;
    color: #fff;
  }
  .login-logo-name span { color: #ff4d7d; }
  .login-subtitle {
    text-align: center; color: #1B3461;
    font-size: 13px; margin-bottom: 32px; margin-top: 6px;
    padding-bottom: 24px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .login-label {
    font-size: 11px; font-weight: 600; color: #6b7689;
    text-transform: uppercase; letter-spacing: 0.7px;
    margin-bottom: 8px; display: block;
  }
  .login-field { margin-bottom: 16px; }
  .login-box input {
    width: 100%; padding: 14px 16px;
    background: #f8f9fa;
    border: 1.5px solid #e0e3e8;
    border-radius: 14px;
    font-size: 15px; outline: none; color: #1e293b;
    transition: all 0.2s ease;
    box-sizing: border-box;
  }
  .login-box input::placeholder { color: #b0b8c5; }
  .login-box input:focus {
    border-color: rgba(232,18,81,0.7);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(232,18,81,0.15);
  }
  #login-btn, .login-box button {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, #e81251, #ff4d7d);
    color: white; border: none;
    border-radius: 14px;
    font-size: 15px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.2px;
    transition: all 0.2s ease;
    margin-top: 8px;
    box-shadow: 0 6px 24px rgba(232,18,81,0.4);
  }
  #login-btn:hover:not(:disabled), .login-box button:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 10px 32px rgba(27,52,97,0.45);
  }
  #login-btn:disabled {
    background: #fff;
    box-shadow: none; cursor: not-allowed; opacity: 0.6;
  }
  .login-footer {
    text-align: center; margin-top: 22px;
    font-size: 11px; color: #b0b8c5;
    letter-spacing: 0.3px;
  }
  .login-error {
    color: #ff6b8a; font-size: 12px; margin-top: 10px;
    display: none; text-align: center;
    background: rgba(232,18,81,0.12);
    border: 1px solid rgba(232,18,81,0.2);
    padding: 10px 14px; border-radius: 12px;
  }
  /* Turnstile centré */
  
  #app-screen { display: none; }

  /* ===== HEADER ===== */
  header { background: var(--navy); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; height: 52px; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-title { font-size: 14px; font-weight: 700; color: var(--white); letter-spacing: 0.1px; }
  .header-right { display: flex; align-items: center; gap: 6px; }
  .header-username { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.9); }
  .header-role-tag { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; background: rgba(229,18,81,0.15); color: #fff; text-transform: uppercase; letter-spacing: 0.6px; margin-right: 4px; border: 1px solid rgba(255,255,255,0.3); }
  .header-sep { width: 1px; height: 20px; background: rgba(255,255,255,0.15); margin: 0 6px; }
  .btn-header { background: none; border: none; color: rgba(255,255,255,0.6); padding: 5px 10px; border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.15s; white-space: nowrap; }
  .btn-header:hover { background: rgba(255,255,255,0.1); color: white; }
  .btn-header-danger { color: rgba(255,150,150,0.85); }
  .btn-header-danger:hover { background: rgba(229,25,94,0.2); color: #ff8fab; }

  /* ===== TABS ===== */
  .tabs { display: flex; padding: 0 28px; background: var(--white); border-bottom: 1px solid var(--gray-200); overflow-x: auto; }
  .tab { padding: 13px 16px; cursor: pointer; white-space: nowrap; font-size: 13px; font-weight: 500; color: var(--gray-600); border-bottom: 2px solid transparent; transition: all 0.18s; display: flex; align-items: center; gap: 6px; }
  .tab.active { color: var(--rose); border-bottom-color: var(--rose); font-weight: 600; }
  .tab:hover:not(.active) { color: var(--navy); background: var(--gray-100); }

  /* ===== CONTENT ===== */
  .content { padding: 20px 28px; }

  /* ===== STAT CARDS ===== */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 18px; }
  .stat-card { background: var(--white); border-radius: var(--radius-md); padding: 16px 18px; box-shadow: var(--shadow-sm); border: 1px solid var(--gray-200); }
  .stat-card .number { font-size: 26px; font-weight: 800; color: var(--navy); line-height: 1; }
  .stat-card .label { font-size: 11px; color: var(--gray-600); margin-top: 4px; font-weight: 500; }

  /* ===== BANDEAU COMPTEURS ===== */
  .filter-bandeau { background: var(--white); border-radius: var(--radius-md); padding: 10px 20px; margin-bottom: 12px; border: 1px solid var(--gray-200); box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 0; overflow-x: auto; flex-wrap: nowrap; }
  .filter-bandeau-group { display: inline-flex; align-items: center; gap: 6px; padding: 3px 20px 3px 0; margin-right: 16px; border-right: 1px solid var(--gray-200); flex-shrink: 0; }
  .filter-bandeau-group:last-child { border-right: none; margin-right: 0; padding-right: 0; }
  .filter-pill { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: all 0.15s; border: 1px solid var(--gray-300); background: var(--gray-100); color: var(--gray-800); user-select: none; }
  .filter-pill:hover { background: var(--gray-200); }
  .filter-pill.active { background: var(--navy); color: white; border-color: var(--navy); }

  /* ===== TABLE CONTAINER ===== */
  .table-container { background: var(--white); border-radius: var(--radius-md); border: 1px solid var(--gray-200); box-shadow: var(--shadow-sm); overflow: hidden; }
  .table-toolbar { padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--gray-200); flex-wrap: wrap; gap: 8px; background: var(--white); }
  .table-toolbar h2 { font-size: 13px; font-weight: 700; color: var(--navy); }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; padding: 10px 18px; background: var(--gray-100); border-bottom: 1px solid var(--gray-200); align-items: center; }
  .search-bar { padding: 7px 12px; border: 1.5px solid var(--gray-300); border-radius: var(--radius-sm); font-size: 13px; outline: none; width: 200px; transition: border 0.2s; background: var(--white); }
  .search-bar:focus { border-color: var(--rose); }
  .filter-select { padding: 7px 10px; border: 1.5px solid var(--gray-300); border-radius: var(--radius-sm); font-size: 13px; outline: none; background: var(--white); cursor: pointer; color: var(--navy); }
  .filter-select:focus { border-color: var(--rose); }

  /* ===== TABLE ===== */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { background: var(--gray-100); }
  th { padding: 9px 14px; text-align: left; font-weight: 600; color: var(--gray-600); border-bottom: 1px solid var(--gray-200); white-space: nowrap; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  td { padding: 11px 14px; border-bottom: 1px solid var(--gray-200); color: var(--navy); vertical-align: middle; }
  tr:hover td { background: #fafbff; }
  tr:last-child td { border-bottom: none; }

  /* ===== BADGES ===== */
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .badge-nonattribue { background: var(--gray-200); color: var(--gray-600); }
  .badge-attribue { background: #e8f0fd; color: #1a56c4; }
  .badge-encours { background: #fef3e2; color: #92540a; }
  .badge-ouvert { background: #feeaea; color: #991b1b; }
  .badge-traite2 { background: #dcfce7; color: #166534; }
  .badge-nontraite { background: #fef3e2; color: #92540a; }
  .badge-verrouille { background: #f0e6ff; color: #6b21a8; font-size: 11px; }

  /* ===== BOUTONS ===== */
  .btn { padding: 7px 14px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px; }
  .btn-primary { background: var(--navy); color: white; }
  .btn-primary:hover { background: var(--navy-light); }
  .btn-success { background: #16a34a; color: white; }
  .btn-success:hover { background: #15803d; }
  .btn-warning { background: #d97706; color: white; }
  .btn-warning:hover { background: #b45309; }
  .btn-danger { background: #dc2626; color: white; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-secondary { background: var(--white); color: var(--gray-800); border: 1.5px solid var(--gray-300); }
  .btn-secondary:hover { background: var(--gray-100); border-color: var(--gray-400); }
  .btn-dispatch { padding: 9px 22px; background: var(--rose); color: white; border: none; border-radius: var(--radius-sm); font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s; letter-spacing: 0.8px; text-transform: uppercase; display: inline-flex; align-items: center; gap: 6px; }
  .btn-dispatch:hover { background: #c9164f; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(229,25,94,0.35); }
  .btn-dispatch:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-copy { background: var(--gray-100); border: 1px solid var(--gray-300); border-radius: 4px; padding: 3px 7px; cursor: pointer; font-size: 11px; color: var(--gray-600); transition: all 0.15s; margin-left: 4px; }
  .btn-copy:hover { background: var(--gray-200); color: var(--navy); }
  .btn-copy.copied { background: #dcfce7; border-color: #22c55e; color: #166534; }
  .btn-edit-user { background: none; border: 1.5px solid var(--gray-300); border-radius: var(--radius-sm); padding: 4px 8px; cursor: pointer; font-size: 12px; color: var(--gray-600); transition: all 0.15s; margin-left: auto; flex-shrink: 0; }
  .btn-edit-user:hover { background: var(--gray-100); color: var(--navy); border-color: var(--gray-400); }
  .btn-demander-supp { padding: 8px 16px; background: #16a34a; color: white; border: none; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px; }
  .btn-demander-supp:hover { background: #15803d; }
  .btn-demander-supp:disabled { opacity: 0.45; cursor: not-allowed; }

  /* ===== CHECKBOXES ===== */
  .row-check { width: 15px; height: 15px; cursor: pointer; accent-color: var(--rose); }
  .traite-checkbox { width: 15px; height: 15px; cursor: pointer; accent-color: #16a34a; }
  .traite-checkbox:disabled { cursor: not-allowed; opacity: 0.3; }
  select.assign-select { padding: 6px 10px; border: 1.5px solid var(--gray-300); border-radius: var(--radius-sm); font-size: 13px; background: var(--white); cursor: pointer; min-width: 160px; color: var(--navy); }

  /* ===== MODALS ===== */
  .modal-overlay { position: fixed; inset: 0; background: rgba(15,27,45,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(2px); }
  .modal { background: var(--white); border-radius: var(--radius-lg); padding: 28px; width: 420px; box-shadow: var(--shadow-md); max-height: 90vh; overflow-y: auto; }
  .modal h2 { color: var(--navy); margin-bottom: 18px; font-size: 17px; font-weight: 700; }
  .modal label { display: block; font-size: 11px; font-weight: 700; color: var(--gray-600); margin-bottom: 5px; margin-top: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .modal input, .modal select { width: 100%; padding: 9px 12px; border: 1.5px solid var(--gray-300); border-radius: var(--radius-sm); font-size: 13px; outline: none; transition: border 0.2s; }
  .modal input:focus, .modal select:focus { border-color: var(--rose); }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
  .modal-error { color: #dc2626; font-size: 12px; margin-top: 8px; display: none; }
  .dispatch-modal-overlay { position: fixed; inset: 0; background: rgba(15,27,45,0.55); display: flex; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(3px); }
  .dispatch-modal { background: var(--white); border-radius: var(--radius-lg); padding: 36px; width: 420px; box-shadow: var(--shadow-md); text-align: center; }
  .dispatch-modal .icon { font-size: 44px; margin-bottom: 12px; }
  .dispatch-modal h2 { color: var(--navy); font-size: 19px; margin-bottom: 8px; font-weight: 700; }
  .dispatch-modal p { color: var(--gray-600); font-size: 13px; margin-bottom: 6px; }
  .dispatch-modal .count { font-size: 38px; font-weight: 900; color: var(--rose); margin: 14px 0; }
  .dispatch-modal .count small { font-size: 12px; color: var(--gray-600); font-weight: 400; display: block; }
  .dispatch-actions { display: flex; gap: 10px; margin-top: 22px; justify-content: center; }

  /* ===== UPLOAD ===== */
  .upload-zone { border: 2px dashed var(--gray-300); border-radius: var(--radius-md); padding: 48px; text-align: center; background: var(--white); margin-bottom: 18px; transition: all 0.2s; cursor: pointer; }
  .upload-zone:hover { border-color: var(--rose); background: var(--rose-light); }
  .upload-zone .icon { font-size: 42px; margin-bottom: 10px; }
  .upload-zone h3 { color: var(--navy); margin-bottom: 6px; font-size: 15px; font-weight: 600; }
  .upload-zone p { color: var(--gray-600); font-size: 13px; }
  #file-input { display: none; }

  /* ===== ÉQUIPE ===== */
  .users-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 10px; }
  .user-card { background: var(--white); border-radius: var(--radius-md); padding: 14px 16px; border: 1px solid var(--gray-200); box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 12px; transition: box-shadow 0.15s; }
  .user-card:hover { box-shadow: var(--shadow-md); }
  .user-avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; color: white; flex-shrink: 0; }
  .avatar-admin { background: var(--navy); }
  .avatar-manager { background: #6b21a8; }
  .avatar-gestionnaire { background: #16a34a; }
  .user-info h4 { font-size: 13px; color: var(--navy); font-weight: 600; }
  .user-info p { font-size: 11px; color: var(--gray-600); margin-top: 1px; }
  .user-role-badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; margin-top: 4px; display: inline-block; text-transform: uppercase; letter-spacing: 0.4px; }
  .role-admin { background: #e8f0fd; color: #1a3c8f; }
  .role-manager { background: #f0e6ff; color: #6b21a8; }
  .role-gestionnaire { background: #dcfce7; color: #166534; }

  /* ===== FORMS ===== */
  .form-card { background: var(--white); border-radius: var(--radius-md); padding: 22px; border: 1px solid var(--gray-200); max-width: 480px; }
  .form-card h2 { color: var(--navy); margin-bottom: 14px; font-size: 15px; font-weight: 700; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--gray-600); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input, .form-group select { width: 100%; padding: 9px 12px; border: 1.5px solid var(--gray-300); border-radius: var(--radius-sm); font-size: 13px; outline: none; transition: border 0.2s; }
  .form-group input:focus, .form-group select:focus { border-color: var(--rose); }
  .form-error { color: #dc2626; font-size: 12px; margin-top: 4px; display: none; }
  .form-success { color: #16a34a; font-size: 12px; margin-top: 4px; display: none; }

  /* ===== NOTIFS ===== */
  .notif { position: fixed; bottom: 20px; right: 20px; padding: 11px 16px; border-radius: var(--radius-md); color: white; font-size: 13px; font-weight: 500; z-index: 9999; box-shadow: var(--shadow-md); animation: slideIn 0.25s ease; max-width: 310px; }
  .notif-success { background: #16a34a; }
  .notif-error { background: #dc2626; }
  .notif-info { background: var(--navy); }
  @keyframes slideIn { from { transform: translateX(80px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* ===== MISC ===== */
  .loading { text-align: center; padding: 40px; color: var(--gray-400); font-size: 13px; }
  .empty-state { text-align: center; padding: 50px; color: var(--gray-400); }
  .empty-state .icon { font-size: 40px; margin-bottom: 10px; }
  .star-supp { color: #d97706; font-size: 13px; margin-left: 3px; }
  .progress-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .progress-bar-bg { background: var(--gray-200); border-radius: 10px; height: 6px; width: 80px; overflow: hidden; }
  .progress-bar-fill { background: #16a34a; height: 6px; border-radius: 10px; }

  @media (max-width: 768px) {
    .content { padding: 12px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    table { font-size: 12px; }
    th, td { padding: 8px 10px; }
    .modal { width: 95vw; padding: 20px; }
    header { padding: 0 14px; }
  }

  /* ===== PANNEAU UNIFIÉ ===== */
  .unified-panel { background: var(--white); border-radius: var(--radius-md); border: 1px solid var(--gray-200); box-shadow: var(--shadow-sm); margin-bottom: 14px; overflow: hidden; }
  .urow { display: flex; align-items: center; gap: 8px; padding: 10px 18px; flex-wrap: wrap; }
  .urow-1 { border-bottom: 1px solid var(--gray-200); background: var(--white); }
  .urow-2 { border-bottom: 1px solid var(--gray-200); background: var(--gray-100); }
  .urow-3 { background: var(--white); padding: 10px 18px; }
  .urow-sep { width: 1px; height: 22px; background: var(--gray-300); flex-shrink: 0; margin: 0 4px; }
  .statut-pill { font-size: 12px; }
  .gest-pill { background: var(--navy-light); color: white; border-color: var(--navy); }
  .gest-pill:hover { background: var(--navy); }
  .gest-pill.active { background: var(--rose); border-color: var(--rose); }
  .check-label { display: flex; align-items: center; gap: 7px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--gray-800); user-select: none; white-space: nowrap; }
  .check-all-label { background: var(--gray-100); padding: 6px 12px; border-radius: var(--radius-sm); font-weight: 600; color: var(--navy); }
  .selection-badge { font-size: 12px; color: var(--gray-600); font-weight: 600; background: var(--gray-100); padding: 5px 12px; border-radius: 20px; white-space: nowrap; }
  /* Supprimer l'ancien bandeau et les anciens filtres si CSS présent */
  .filter-bandeau, .filters { display: none !important; }

@keyframes spin {
  0%   { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

  /* ===== MODE SOMBRE ===== */
  body.dark-mode {
    --navy: #e8eaf0;
    --navy-light: #c5cad8;
    --rose: #ff6b9d;
    --rose-light: #3a1a2a;
    --gray-bg: #0f1117;
    --gray-100: #1a1d27;
    --gray-200: #252836;
    --gray-300: #353849;
    --gray-400: #6b7689;
    --gray-600: #9aa3b5;
    --gray-800: #d0d5e0;
    --white: #1e2130;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.5);
    background: var(--gray-bg);
    color: var(--gray-800);
  }
  body.dark-mode header { background: #0d1f3c; border-bottom: 1px solid #1B3461; }
  body.dark-mode .tabs { background: #111d35; border-bottom: 1px solid #1B3461; }
  body.dark-mode .tab:not(.active) { color: #7b859a; }
  body.dark-mode table thead { background: #1a1d27; }
  body.dark-mode tr:hover td { background: #1e2235 !important; }
  body.dark-mode input, body.dark-mode select, body.dark-mode .modal { background: #1e2130 !important; color: #d0d5e0 !important; border-color: #353849 !important; }
  body.dark-mode .modal { background: #1a1d27 !important; }
  body.dark-mode .btn-secondary { background: #252836; color: #d0d5e0; border-color: #353849; }
  body.dark-mode .stat-card, body.dark-mode .table-container, body.dark-mode .user-card, body.dark-mode .form-card { background: #1a1d27 !important; border-color: #2a2d3e !important; }
  body.dark-mode .login-box { background: rgba(20,22,35,0.9) !important; }
  body.dark-mode td, body.dark-mode th { color: #d0d5e0; border-color: #2a2d3e; }
  body.dark-mode .notif-success { background: #1a4a2e; }
  body.dark-mode .notif-error { background: #4a1a1a; }
  /* Toggle button */
  .dark-toggle {
    background: none; border: none; cursor: pointer;
    font-size: 18px; padding: 4px 8px; border-radius: 6px;
    transition: background 0.2s; color: rgba(255,255,255,0.7);
    line-height: 1;
  }
  .dark-toggle:hover { background: rgba(255,255,255,0.1); }

  function toggleDarkMode() {
    var isDark = document.body.classList.toggle('dark-mode');

    document.getElementById('dark-toggle-btn').textContent = isDark ? '☀️' : '🌙';

  function initDarkMode() {

  var safeSession = {
    getItem: function(k) { try { return sessionStorage.getItem(k); } catch(e) { return null; } },
    setItem: function(k, v) { try { sessionStorage.setItem(k, v); } catch(e) {} },
    removeItem: function(k) { try { sessionStorage.removeItem(k); } catch(e) {} },
    clear: function() { try { safeSession.clear(); } catch(e) {} }
  };

  // ===== RENOUVELLEMENT MOT DE PASSE (90j) =====
  var PWD_RENEWAL_DAYS = 90;

  async function checkPasswordExpiry() {
    if (!currentUserData) return;
    var lastChange = currentUserData.last_password_change;
    // Si la colonne n'existe pas en DB (undefined) → ne pas forcer
    if (lastChange === undefined) return;
    if (!lastChange) {
      // Champ null = première connexion → forcer le changement
      showPasswordRenewalModal(true);
      return;
    }
    var daysSince = Math.floor((Date.now() - new Date(lastChange).getTime()) / (1000 * 60 * 60 * 24));
    if (daysSince >= PWD_RENEWAL_DAYS) {
      showPasswordRenewalModal(false, daysSince);
    } else if (daysSince >= PWD_RENEWAL_DAYS - 7) {
      // Avertissement 7j avant expiration
      var remaining = PWD_RENEWAL_DAYS - daysSince;
      showNotif('⚠️ Votre mot de passe expire dans ' + remaining + ' jour(s). Pensez à le changer.', 'info');
    }
  }

      + '<h2 style="color:var(--rose)">' + title + '</h2>'

async function doReleaseManager(nom) {
  closeModal('release-modal');

  let ok = 0;
  for (const d of dossiers) {

    }); // Seulement les membres avec au moins 1 dossier dans les 3 derniers mois
    membres.forEach(g => {
      const nom = g.prenom + ' ' + g.nom;
      const t = dos3m.filter(d => d.gestionnaire === nom).length;
      const tr = dos3m.filter(d => d.gestionnaire === nom && d.traite).length;
      const pct = t > 0 ? Math.round(tr / t * 100) : 0;
      const tdLiberer = canRelease ? `<td><button class="btn btn-warning" style="padding:4px 12px;font-size:12px" onclick="showReleaseManager('${nom}')">🔓 Libérer</button></td>` : '';
      html += `<tr><td><strong>${nom}</strong></td><td><span class="badge role-${g.role}" style="padding:3px 8px;border-radius:10px;font-size:11px">${g.role}</span></td>
        <td>${t}</td><td>${tr}</td><td>${t - tr}</td>
        <td><div style="display:flex;align-items:center;gap:8px">
        <div style="background:#eee;border-radius:10px;height:8px;width:80px">
        <div style="background:#27ae60;height:8px;border-radius:10px;width:${pct}%"></div></div>
        <small style="color:#888">${pct}%</small></div></td>${tdLiberer}</tr>`;
    });
    html += '</tbody></table></div>';
  }
  document.getElementById('main-content').innerHTML = html;
}

function renderImport() {
  document.getElementById('main-content').innerHTML = `
    <div class="upload-zone" onclick="document.getElementById('file-input').click()">

    </div>
    <input type="file" id="file-input" accept=".xlsx,.xls" onchange="handleFile(event)">
    <div id="import-result"></div>`;

function detectPortefeuille(refContrat) {
  const r = (refContrat || '').toUpperCase();
  if (r.includes('OPTI')) return 'OPTINEO';
  return 'MIA';
}

function detectType(refContrat, refSinistre) {
  const r  = (refContrat  || '').toUpperCase();
  const rs = (refSinistre || '').toUpperCase();
  if (r.includes('MRH')  || rs.includes('MRH'))  return 'Habitation';
  if (r.includes('IMMO') || rs.includes('IMMO'))  return 'Habitation';
  return 'Auto';
}

async function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const workbook = XLSX.read(e.target.result, { type: 'array', cellDates: true, dateNF: 'dd/mm/yyyy' });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
    if (!rows.length) { showNotif('Fichier vide ou format incorrect.', 'error'); return; }

    const firstRow = rows[0];
    const normalize = s => String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]/g, '');
    const keyMap = {};
    Object.keys(firstRow).forEach(k => { keyMap[normalize(k)] = k; });
    const formatDateVal = (v) => {
      if (!v) return '';
      // Si c'est déjà une date JS ou une string parseable
      var d = (v instanceof Date) ? v : new Date(v);
      if (!isNaN(d.getTime())) {
        var dd = String(d.getDate()).padStart(2,'0');
        var mm = String(d.getMonth()+1).padStart(2,'0');
        var yyyy = d.getFullYear();
        return dd + '/' + mm + '/' + yyyy;
      }
      return String(v).trim();
    };
    const get = (r, ...candidates) => {
      for (const c of candidates) {
        const norm = normalize(c);
        if (keyMap[norm] !== undefined && r[keyMap[norm]] !== undefined && r[keyMap[norm]] !== '') {
          var raw = r[keyMap[norm]];
          return (raw instanceof Date) ? formatDateVal(raw) : String(raw).trim();
        }
      }
      return '';
    };

    document.getElementById('import-result').innerHTML = '<div class="loading">Import en cours...</div>';

    const mapped = rows.map(r => ({
      ref_sinistre: get(r, 'Ref sinistre', 'Réf. sinistre', 'Ref. sinistre', 'REF SINISTRE', 'ref_sinistre'),
      date_etat: get(r, 'Date Etat', 'Date état', 'Date etat', 'DATE ETAT', 'date_etat', 'DateEtat', 'dateetat'),
      ref_contrat: get(r, 'Ref contrat', 'Réf. contrat', 'Ref. contrat', 'REF CONTRAT', 'ref_contrat'),
      nature: get(r, 'Nature MIN', 'Nature', 'nature', 'NATURE'),
      nature_label: get(r, 'Desc. Nature', 'Nature', 'Nature label', 'nature_label', 'Libellé nature'),
      type: detectType(get(r, 'Ref contrat', 'Réf. contrat', 'Ref. contrat', 'REF CONTRAT', 'ref_contrat'), get(r, 'Ref sinistre', 'Réf. sinistre', 'Ref. sinistre', 'REF SINISTRE', 'ref_sinistre')),
      portefeuille: detectPortefeuille(get(r, 'Ref contrat', 'Réf. contrat', 'Ref. contrat', 'REF CONTRAT', 'ref_contrat')),
    })).filter(d => d.ref_sinistre);

    if (!mapped.length) {
      showNotif('Aucune ligne valide trouvée. Vérifiez les noms de colonnes.', 'error');
      document.getElementById('import-result').innerHTML = '';
      return;
    }

    // ── DÉTECTION RE-IMPORT ────────────────────────────────────
    await loadDossiers();
    const existingRefs = new Map(allDossiers.map(d => [d.ref_sinistre, d]));
    const isReimport = existingRefs.size > 0;

    let nouveaux = [], relances = [], ignores = 0;

    for (const row of mapped) {
      const existing = existingRefs.get(row.ref_sinistre);
      if (!existing) {
        // Nouveau dossier
        nouveaux.push({ ...row, gestionnaire: '', traite: false, verrouille: false, statut: 'nonattribue' });
      } else if (existing.traite) {
        // Dossier traité → relancé
        relances.push(existing);
      } else {
        // Doublon non traité → mettre à jour date_etat si elle a changé
        if (row.date_etat) {
          await db.from('dossiers').update({ date_etat: row.date_etat }).eq('id', existing.id);
        }
        ignores++;
      }
    }

    // Insérer les nouveaux
    if (nouveaux.length > 0) {
      const { error } = await db.from('dossiers').insert(nouveaux);
      if (error) { showNotif('Erreur import : ' + error.message, 'error'); return; }
    }

    // Relancer les dossiers traités
    let relancesNotif = [];
    for (const d of relances) {
      await db.from('dossiers').update({
        statut: 'ouvert',
        traite: false,
        verrouille: true,
        traite_at: null
      }).eq('id', d.id);
      relancesNotif.push({ ref: d.ref_sinistre, gestionnaire: d.gestionnaire });
    }

    // Notifications temps réel pour les gestionnaires relancés
    if (relancesNotif.length > 0) {
      // Marquer en sessionStorage pour affichage dans renderMesDossiers
      const existingRelances = JSON.parse(safeSession.getItem('relances_notif') || '[]');
      const merged = [...existingRelances, ...relancesNotif.map(r => r.ref)];
      safeSession.setItem('relances_notif', JSON.stringify(merged));
    }

    await auditLog('IMPORT_EXCEL', (isReimport ? 'RE-IMPORT' : 'IMPORT') + ' — ' + nouveaux.length + ' nouveaux, ' + relances.length + ' relancés, ' + ignores + ' ignorés');

    await loadDossiers();
    await loadAllUsers();

    // ── BOÎTE DE DIALOGUE RÉSUMÉ ───────────────────────────────
    showImportSummaryModal(nouveaux.length, relances.length, ignores, relancesNotif, isReimport);
  };
  reader.readAsArrayBuffer(file);
}

async function doAutoAssign(totalImported) {
  const checks = [...document.querySelectorAll('.gest-check:checked')];
  if (!checks.length) {
    const err = document.getElementById('auto-assign-error');
    err.textContent = 'Sélectionnez au moins un gestionnaire.';
    err.style.display = 'block'; return;
  }
  const selections = checks.map(cb => ({
    nom: cb.dataset.nom,
    nb: parseInt(document.querySelector(`.gest-nb[data-nom="${cb.dataset.nom}"]`).value) || 10
  }));
  const totalDemande = selections.reduce((s, x) => s + x.nb, 0);
  const dossiersNonAttribues = allDossiers.filter(d => !d.gestionnaire);
  const disponibles = dossiersNonAttribues.length;
  if (totalDemande > disponibles) {
    const parGest = Math.floor(disponibles / selections.length);
    const err = document.getElementById('auto-assign-error');
    err.innerHTML = `⚠️ Vous demandez <strong>${totalDemande}</strong> dossiers mais il n'en reste que <strong>${disponibles}</strong> non attribués.<br><br>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:8px">
        <button class="btn btn-secondary" onclick="document.getElementById('auto-assign-error').style.display='none'">✏️ Modifier</button>
        <button class="btn btn-warning" onclick="doAutoAssignEquitable(${disponibles})">⚖️ Répartir équitablement (${parGest} chacun)</button>
      </div>`;
    err.style.display = 'block'; return;
  }
  await executeAutoAssign(selections, dossiersNonAttribues);
}

async function doAutoAssignEquitable(disponibles) {
  const checks = [...document.querySelectorAll('.gest-check:checked')];
  const nb = Math.floor(disponibles / checks.length);
  const selections = checks.map(cb => ({ nom: cb.dataset.nom, nb }));
  const dossiers = allDossiers.filter(d => !d.gestionnaire);
  await executeAutoAssign(selections, dossiers);
}

async function executeAutoAssign(selections, dossiers) {
  let idx = 0;
  for (const sel of selections) {
    const batch = dossiers.slice(idx, idx + sel.nb);
    for (const d of batch) {
      await db.from('dossiers').update({ gestionnaire: sel.nom, verrouille: true }).eq('id', d.id);
    }
    idx += sel.nb;
  }
  closeModal('auto-assign-modal');
  showNotif(`✅ ${idx} dossiers attribués et verrouillés !`, 'success');
  await loadDossiers();
  showTab('attribution');
}

// ===== COPIER REFERENCE =====
async function copyRef(ref, dossierstatut, id, btn) {
  // Si un dossier est "encours", le passer en "ouvert"
  if (dossierstatut === 'encours') {
    const enCours = allDossiers.find(d => d.statut === 'encours' && d.id !== id);
    if (enCours) {
      await db.from('dossiers').update({ statut: 'ouvert' }).eq('id', enCours.id);
      allDossiers = allDossiers.map(d => d.id === enCours.id ? {...d, statut: 'ouvert'} : d);
    }
  }
  // Passer ce dossier en "encours"
  await db.from('dossiers').update({ statut: 'encours' }).eq('id', id);
  allDossiers = allDossiers.map(d => d.id === id ? {...d, statut: 'encours'} : d);
  // Copier dans le presse-papiers
  navigator.clipboard.writeText(ref).then(() => {
    btn.textContent = '✅'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋'; btn.classList.remove('copied'); }, 2000);
  });
}

// ===== TOGGLE TRAITÉ DANS MES DOSSIERS =====
async function toggleTraiteMesDossiers(id, checked) {
  const newStatut = checked ? 'traite' : 'ouvert';
  const { error } = await db.from('dossiers').update({
    traite: checked,
    statut: newStatut,
    traite_at: checked ? new Date().toISOString() : null
  }).eq('id', id);
  if (error) { showNotif('Erreur : ' + error.message, 'error'); return; }
  if (checked) {
    const d = (allDossiers || []).find(x => String(x.id) === String(id));
    if (d) {
      await db.from('historique_sinistres').upsert(
        { ref_sinistre: d.ref_sinistre, gestionnaire: currentUserData.prenom + ' ' + currentUserData.nom, date_traitement: new Date().toISOString().split('T')[0] },
        { onConflict: 'ref_sinistre', ignoreDuplicates: true }
      );
    }
  }
  await auditLog(checked ? 'TRAITEMENT_DOSSIER' : 'REOUVERTURE_DOSSIER',
    (checked ? 'Dossier marqué traité' : 'Dossier réouvert') + ' — id:' + id);
  showNotif(checked ? '✅ Dossier marqué comme traité.' : '🔄 Dossier réouvert.', 'success');
  await loadDossiers();
  renderMesDossiers();
}

// ===== RÉCUPÉRER UN DOSSIER (gestionnaire) =====
async function recupererDossier(dossierId) {
  const monNom = currentUserData.prenom + ' ' + currentUserData.nom;
  // Vérification concurrence : relire le dossier en base
  const { data: fresh, error: errFresh } = await db.from('dossiers')
    .select('id, gestionnaire, statut, verrouille, ref_sinistre')
    .eq('id', dossierId).maybeSingle();
  if (errFresh) { showNotif('Erreur : ' + errFresh.message, 'error'); return; }
  if (!fresh) { showNotif('Dossier introuvable.', 'error'); return; }
  // Premier arrivé premier servi
  if (fresh.gestionnaire && fresh.gestionnaire !== '') {
    showNotif('⚠️ Ce dossier vient d\'être récupéré par ' + fresh.gestionnaire + '.', 'error');
    await loadDossiers(); renderAttribution(); return;
  }
  const { error } = await db.from('dossiers').update({
    gestionnaire: monNom,
    statut: 'attribue',
    verrouille: true
  }).eq('id', dossierId);
  if (error) { showNotif('Erreur : ' + error.message, 'error'); return; }
  await auditLog('RECUPERATION_DOSSIER', 'Dossier ' + (fresh.ref_sinistre||dossierId) + ' récupéré en autonomie');
  showNotif('✅ Dossier ' + (fresh.ref_sinistre||'') + ' ajouté à vos dossiers !', 'success');
  await loadDossiers();
  renderAttribution();
}

async function renderMesDossiers() {
  document.getElementById('main-content').innerHTML = '<div class="loading">Chargement...</div>';
  await loadDossiers();
  await loadAllUsers();
  var resHistoMD = await db.from('historique_sinistres').select('ref_sinistre, gestionnaire, date_traitement');
  window._historiqueMap = {};
  if (resHistoMD.data) resHistoMD.data.forEach(function(h){ window._historiqueMap[h.ref_sinistre] = h; });
  window._historiqueActif = true;
  const monNom = currentUserData.prenom + ' ' + currentUserData.nom;
  const mesDossiers = allDossiers.filter(d => d.gestionnaire === monNom);
  let html = `<div class="stats-grid">
    <div class="stat-card"><div class="number">${mesDossiers.length}</div><div class="label">Mes dossiers</div></div>
    <div class="stat-card"><div class="number" style="color:#27ae60">${mesDossiers.filter(d=>d.traite).length}</div><div class="label">Traités</div></div>
    <div class="stat-card"><div class="number" style="color:#e67e22">${mesDossiers.filter(d=>!d.traite).length}</div><div class="label">En cours</div></div>
  </div>
  <div class="table-container">
    <div class="table-toolbar"><h2>Mes dossiers</h2><button class="btn-demander-supp" onclick="demanderDossierSupp()">&#10133; Demander un dossier suppl&eacute;mentaire</button></div>
    <table><thead><tr>
      <th>Réf. Sinistre</th><th>Réf. Contrat</th><th>Nature</th>
      <th>Portefeuille</th><th>Statut</th><th>Marquer traité</th>
    </tr></thead><tbody>`;
  if (!mesDossiers.length) {
    html += '<tr><td colspan="6"><div class="empty-state"><div class="icon">📭</div><p>Aucun dossier attribué pour le moment.</p></div></td></tr>';
  } else {
    const monNomMD = currentUserData.prenom + ' ' + currentUserData.nom;
    const histoMapMD = window._historiqueMap || {};
    const histoActifMD = window._historiqueActif !== false;
    // Trier : dossiers "déjà traités par moi" en premier
    // Tri fixe : prioritaires non traités → autres non traités → traités (stable par ID)
    function _isPrioMD(d) {
      var pf  = (d.portefeuille||'').toUpperCase();
      var tp  = (d.type||'').toUpperCase();
      var nat = (d.nature_label||d.nature||'').toUpperCase();
      var hasRef = histoActifMD && histoMapMD[d.ref_sinistre] && histoMapMD[d.ref_sinistre].gestionnaire === monNomMD;
      return pf.includes('OPTINEO') || tp.includes('MRH') || tp.includes('HABITATION')
          || nat.includes('BRIS DE GLACE') || nat.includes('BDG') || hasRef;
    }
    // Dossiers récupérés manuellement en cours de session → mis en bas
    var _recuperesMD = JSON.parse(safeSession.getItem('_recuperesMD') || '[]');
    var _recuperesSetMD = new Set(_recuperesMD.map(Number));
    mesDossiers.sort(function(a, b) {
      // Dossiers récupérés manuellement → en bas
      var aR = _recuperesSetMD.has(a.id) ? 1 : 0;
      var bR = _recuperesSetMD.has(b.id) ? 1 : 0;
      if (aR !== bR) return aR - bR;
      // Ordre fixe par ID (ordre d'import) — jamais modifié par statut traité
      return (a.id || 0) - (b.id || 0);
    });
    // Récupérer refs relancées depuis sessionStorage
    const relancesRefs = JSON.parse(safeSession.getItem('relances_notif') || '[]');

    // Pop-up temps réel si des relances concernent ce gestionnaire
    const mesRelances = mesDossiers.filter(d => relancesRefs.includes(d.ref_sinistre));
    if (mesRelances.length > 0) {
      setTimeout(function() {
        var notifHtml = mesRelances.map(r => '<li style="font-size:13px"><strong>' + r.ref_sinistre + '</strong></li>').join('');
        var relanceModal = document.createElement('div');
        relanceModal.className = 'modal-overlay';
        relanceModal.id = 'relance-notif-modal';
        relanceModal.style.zIndex = 6000;
        relanceModal.innerHTML = '<div class="modal" style="max-width:420px;text-align:center">'
          + '<div style="font-size:44px;margin-bottom:8px">🔄</div>'
          + '<h2 style="color:#e67e22">Dossier(s) relancé(s)</h2>'
          + '<p style="color:#666;font-size:13px;margin:8px 0 16px">Le manager a importé une nouvelle remontée.<br>Les dossiers suivants nécessitent votre attention :</p>'
          + '<ul style="text-align:left;margin:0 0 16px 16px;padding:0">' + notifHtml + '</ul>'
          + '<button class="btn btn-primary" style="width:100%" onclick="closeModal(&apos;relance-notif-modal&apos;)">✅ J\'ai compris</button>'
          + '</div>';
        document.body.appendChild(relanceModal);
        // Vider la notif après affichage
        safeSession.setItem('relances_notif', JSON.stringify(
          relancesRefs.filter(r => !mesRelances.map(d => d.ref_sinistre).includes(r))
        ));
      }, 500);
    }

    mesDossiers.forEach(d => {
      const statut = d.statut || 'nonattribue';
      const canSee = ['attribue','encours','ouvert','traite'].includes(statut);
      if (!canSee) return;
      const histoEntryMD = histoActifMD ? histoMapMD[d.ref_sinistre] : null;
      const dejaTraiteParMoi = histoEntryMD && histoEntryMD.gestionnaire === monNomMD;
      const isRelance = relancesRefs.includes(d.ref_sinistre) || (statut === 'ouvert' && !d.traite);
      html += `<tr style="${isRelance ? 'background:#fffde7;border-left:3px solid #f39c12' : (dejaTraiteParMoi ? 'background:#fffbea;border-left:3px solid #ffc107' : '')}">
        <td><strong>${d.ref_sinistre}</strong>
          <button class="btn-copy" onclick="copyRef('${d.ref_sinistre}', '${statut}', '${d.id}', this)" title="Copier la référence">📋</button>
          ${isRelance ? '<span style="display:inline-flex;align-items:center;gap:4px;background:#fff3cd;border:1px solid #f39c12;border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700;color:#e67e22;margin-left:4px">🔄 Relancé</span>' : ''}
          ${dejaTraiteParMoi ? `<div style="margin-top:3px;display:inline-flex;align-items:center;gap:4px;background:#fff3cd;border:1px solid #ffc107;border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700;color:#856404">📌 Déjà traité le ${new Date(histoEntryMD.date_traitement).toLocaleDateString('fr-FR')}</div>` : ''}
        </td>
        <td>${d.ref_contrat}</td>
        <td>${d.nature_label || d.nature}</td>
        <td>${d.portefeuille}</td>
        <td>${statutBadge(d.statut, d.verrouille)}</td>
        <td style="text-align:center">
          <input type="checkbox" class="traite-checkbox" ${d.traite?'checked':''}
            style="width:17px;height:17px;accent-color:var(--rose);cursor:pointer"
            onchange="toggleTraiteMesDossiers('${d.id}', this.checked)">
        </td>
      </tr>`;
    });
  }
  html += '</tbody></table></div>';
  document.getElementById('main-content').innerHTML = html;
}

  overlay.className = 'modal-overlay'; overlay.id = 'purge-auth-modal';

    <div class="modal" style="max-width:420px;text-align:center">

        de plus de <strong>3 mois</strong>. Elle est <u>irréversible</u>.
      </p>
      <p style="font-size:13px;color:#555;margin-bottom:8px">
        Confirmez votre identité en entrant votre mot de passe :
      </p>
      <input type="password" id="purge-pwd-input" placeholder="Votre mot de passe..."
        style="width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:16px;box-sizing:border-box">
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-secondary" onclick="closeModal('purge-auth-modal')">❌ Annuler</button>
        <button class="btn btn-danger" onclick="authenticateAndPurge()">✅ Confirmer la purge</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('purge-pwd-input')?.focus(), 100);
}

async function authenticateAndPurge() {
  const pwd = document.getElementById('purge-pwd-input')?.value;
  if (!pwd) { showNotif('Veuillez entrer votre mot de passe.', 'error'); return; }
  const { error } = await db.auth.signInWithPassword({
    email: currentUser.email,
    password: pwd
  });
  if (error) {
    window._purgeFailCount = (window._purgeFailCount || 0) + 1;
    const remaining = 3 - window._purgeFailCount;
    if (window._purgeFailCount >= 3) {
      closeModal('purge-auth-modal');
      window._purgeFailCount = 0;
      triggerEmergencyLockdown();
      return;
    }
    showNotif(`❌ Mot de passe incorrect. ${remaining} tentative(s) restante(s) avant blocage d'urgence.`, 'error');
    document.getElementById('purge-pwd-input').value = '';
    return;
  }
  window._purgeFailCount = 0; // Reset compteur si succès
  // Auth OK → étape 2 : justification obligatoire
  closeModal('purge-auth-modal');
  showPurgeJustificationModal();
}

// ===== COMMANDE D'URGENCE — Blocage 30 min + RAZ données =====
async function triggerEmergencyLockdown() {
  // ÉTAPE 1 — Tracer en premier (audit_logs inaltérable)
  await auditLog('URGENCE_LOCKDOWN',
    '3 tentatives échouées sur purge — Chiffrement AES-256 des données utilisateurs + RAZ dossiers + blocage 30 min');

  // ÉTAPE 2 — Chiffrement AES-256 des données utilisateurs (clé jetable — irrécupérable sans backup)
  try {
    // Générer une clé AES-256-GCM aléatoire jetable (jamais stockée)
    const aesKey = await crypto.subtle.generateKey(
      { name: 'AES-GCM', length: 256 }, true, ['encrypt']
    );
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const enc = new TextEncoder();

    // Récupérer tous les utilisateurs
    const { data: users } = await db.from('utilisateurs').select('id,nom,prenom,role');
    if (users && users.length > 0) {
      for (const u of users) {
        // Chiffrer nom + prenom
        const payload = JSON.stringify({ nom: u.nom, prenom: u.prenom, role: u.role });
        const encrypted = await crypto.subtle.encrypt(
          { name: 'AES-GCM', iv },
          aesKey,
          enc.encode(payload)
        );
        const encB64 = btoa(String.fromCharCode(...new Uint8Array(encrypted)));
        // Écraser les champs en base avec les données chiffrées
        await db.from('utilisateurs').update({
          nom:    '[ENC:' + encB64.substring(0, 40) + ']',
          prenom: '[ENC:' + encB64.substring(40, 80) + ']'
        }).eq('id', u.id);
      }
    }
    // Clé NON stockée → crypto-shredding : données irrécupérables sans backup
    await auditLog('URGENCE_CHIFFREMENT', 'Chiffrement AES-256-GCM exécuté — clé jetable non conservée — restauration backup requise');
  } catch(e) {
    await auditLog('URGENCE_CHIFFREMENT_ERREUR', 'Erreur chiffrement : ' + e.message);
  }

  // ÉTAPE 3 — RAZ des dossiers de travail
  try {
    const { data: ids } = await db.from('dossiers').select('id');
    if (ids && ids.length > 0) {
      await db.from('dossiers').delete().in('id', ids.map(d => d.id));
    }
  } catch(e) { /* silencieux */ }

  // ÉTAPE 4 — Déconnexion forcée
  await db.auth.signOut();

  // ÉTAPE 5 — Lockout 30 min
  const lockoutUntil = Date.now() + (30 * 60 * 1000);
  safeLocal.setItem('dispatchis_emergency_lockout', lockoutUntil.toString());
  safeLocal.setItem('dispatchis_emergency_time', new Date().toLocaleString('fr-FR'));

  // ÉTAPE 6 — Écran de blocage
  showLockoutScreen();
}

function showLockoutScreen() {
  const lockoutUntil = parseInt(safeLocal.getItem('dispatchis_emergency_lockout') || '0');
  const lockoutTime  = safeLocal.getItem('dispatchis_emergency_time') || '';
  // Masquer tout
  document.getElementById('login-screen').style.display  = 'none';
  document.getElementById('app-screen').style.display    = 'none';

  // Créer l'écran de blocage s'il n'existe pas
  let screen = document.getElementById('lockout-screen');
  if (!screen) {
    screen = document.createElement('div'); screen.id = 'lockout-screen';
    screen.style.cssText = 'position:fixed;inset:0;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;font-family:sans-serif;text-align:center;padding:30px';
    document.body.appendChild(screen);
  }

  const updateTimer = () => {
    const remaining = Math.max(0, lockoutUntil - Date.now());
    const min  = Math.floor(remaining / 60000);
    const sec  = Math.floor((remaining % 60000) / 1000);
    const timeStr = `${min}:${sec.toString().padStart(2,'0')}`;

    screen.innerHTML = `
      <div style="font-size:72px;margin-bottom:16px">🚨</div>
      <h1 style="color:#e74c3c;font-size:28px;margin-bottom:8px">ACCÈS BLOQUÉ</h1>
      <p style="color:#aaa;font-size:15px;margin-bottom:6px">3 tentatives d'authentification échouées détectées.</p>
      <p style="color:#e74c3c;font-size:13px;margin-bottom:4px">🔐 Données utilisateurs chiffrées AES-256 — clé détruite.</p>
      <p style="color:#e67e22;font-size:13px;margin-bottom:24px">🗑️ Données de travail réinitialisées. Restauration backup requise.</p>
      <div style="background:#2d2d44;border-radius:16px;padding:24px 40px;margin-bottom:24px">
        <div style="color:#fff;font-size:48px;font-weight:700;letter-spacing:4px">${remaining > 0 ? timeStr : '00:00'}</div>
        <div style="color:#888;font-size:12px;margin-top:4px">Réouverture automatique</div>
      </div>
      <p style="color:#666;font-size:11px">Incident enregistré le ${lockoutTime}</p>
      ${remaining <= 0 ? '<button onclick="unlockAfterLockout()" style="margin-top:20px;padding:12px 32px;background:#27ae60;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer">🔓 Accéder à nouveau</button>' : ''}
    `;
    if (remaining > 0) setTimeout(updateTimer, 1000);
  };
  updateTimer();
}

function unlockAfterLockout() {
  safeLocal.removeItem('dispatchis_emergency_lockout');
  safeLocal.removeItem('dispatchis_emergency_time');
  const screen = document.getElementById('lockout-screen');
  if (screen) screen.remove();
  document.getElementById('login-screen').style.display = 'flex';
}

    modal.className = 'modal-overlay'; modal.id = 'lock-warn-modal';

    const inner = document.createElement('div');

    inner.appendChild(sel);
    const btns = document.createElement('div');

  await executeLock(ids, gestionnaire);

  await loadDossiers();
  renderAttribution();

async function toggleVerrouille(id, checked) {
  const dossier = allDossiers.find(d => d.id === id);
  const statut = dossier?.statut || 'nonattribue';
  const isDispatched = ['attribue','encours','ouvert','traite'].includes(statut);

  // Si on veut déverrouiller un dossier dispatché → seul manager
  if (!checked && isDispatched && !isManager) {
    showNotif('Seul le manager peut déverrouiller un dossier dispatché.', 'error');
    renderAttribution(); return;
  }

  if (!checked && isDispatched && isManager) {
    showUnlockConfirm(id);
    renderAttribution(); return;
  }

  const { error } = await db.from('dossiers').update({ verrouille: checked }).eq('id', id);
  if (error) { showNotif('Erreur.', 'error'); return; }
  allDossiers = allDossiers.map(d => d.id === id ? {...d, verrouille: checked} : d);
  showNotif(checked ? '🔒 Dossier verrouillé' : '🔓 Dossier déverrouillé', 'info');
  // Mettre à jour le compteur dispatch
  const nbVerrouilles = allDossiers.filter(d => d.verrouille && !['attribue','encours','ouvert','traite'].includes(d.statut||'nonattribue')).length;
  const btn = document.querySelector('.btn-dispatch');
  if (btn) { btn.disabled = nbVerrouilles === 0; btn.textContent = `🚀 DISPATCHER${nbVerrouilles > 0 ? ` (${nbVerrouilles})` : ''}`; }
}

function showUnlockConfirm(id) {
  const existing = document.getElementById('unlock-confirm-modal');
  if (existing) existing.remove();
  const d = allDossiers.find(x => x.id === id);
  const gname = d && d.gestionnaire ? ' (attribué à <strong>' + d.gestionnaire + '</strong>)' : '';
  const modal = document.createElement('div');
  modal.className = 'modal-overlay'; modal.id = 'unlock-confirm-modal';
  const inner = document.createElement('div');
  inner.className = 'modal'; inner.style.cssText = 'text-align:center;max-width:420px';
  inner.innerHTML = '<div style="font-size:44px;margin-bottom:12px">🔓</div>'
    + '<h2 style="color:#e74c3c">Libérer ce dossier ?</h2>'
    + '<p style="color:#666;margin:16px 0">Cette action va <strong>désattribuer</strong> le dossier' + gname + ' et remettre son statut à <strong>Non attribué</strong>.</p>';
  const btns = document.createElement('div');
  btns.style.cssText = 'display:flex;gap:10px;justify-content:center;margin-top:20px';
  const btnC = document.createElement('button'); btnC.className = 'btn btn-secondary'; btnC.textContent = 'Annuler';
  btnC.onclick = () => closeModal('unlock-confirm-modal');
  const btnO = document.createElement('button'); btnO.className = 'btn btn-danger'; btnO.textContent = '🔓 Confirmer la libération';
  btnO.onclick = () => confirmUnlock(id);
  btns.appendChild(btnC); btns.appendChild(btnO); inner.appendChild(btns); modal.appendChild(inner);
  document.body.appendChild(modal);
}

async function confirmUnlock(id) {
  closeModal('unlock-confirm-modal');
  const { error } = await db.from('dossiers').update({ verrouille: false, gestionnaire: '', statut: 'nonattribue' }).eq('id', id);
  if (error) { showNotif('Erreur lors du déverrouillage.', 'error'); return; }
  showNotif('🔓 Dossier déverrouillé et désattribué.', 'success');
  await loadDossiers();
  renderAttribution();
}

async function assignDossier(id, gestionnaire) {
  const { error } = await db.from('dossiers').update({ gestionnaire }).eq('id', id);
  if (error) { showNotif('Erreur lors de l\'attribution.', 'error'); return; }
  showNotif(gestionnaire ? `Dossier attribué à ${gestionnaire}` : 'Attribution annulée', 'success');
  allDossiers = allDossiers.map(d => d.id === id ? {...d, gestionnaire} : d);
}

async function toggleTraite(id, checked, gestionnaire) {
  const monNom = currentUserData.prenom + ' ' + currentUserData.nom;
  const isManager = ['admin','manager'].includes(currentUserData.role);
  if (!isManager && gestionnaire !== monNom) {
    showNotif('Vous ne pouvez cocher que vos propres dossiers.', 'error');
    renderAttribution(); return;
  }
  // Gestionnaire peut décocher traité → statut ouvert, reste verrouillé
  // (isManager ou propriétaire du dossier)
  const newStatut = checked ? 'traite' : 'ouvert';
  const { error } = await db.from('dossiers').update({ traite: checked, statut: newStatut, traite_at: checked ? new Date().toISOString() : null }).eq('id', id);
  if (error) { showNotif('Erreur.', 'error'); return; }
  const dossierRef = (allDossiers.find(function(d){ return d.id === id; }) || {}).ref_sinistre || ('ID ' + id);
  await auditLog(checked ? 'MARQUER_TRAITE' : 'REMETTRE_EN_COURS', 'Réf. sinistre : ' + dossierRef);
  if (checked) {
    const dFound = allDossiers.find(function(d){ return d.id === id; });
    if (dFound && dFound.ref_sinistre) {
      await db.from('historique_sinistres').upsert(
        { ref_sinistre: dFound.ref_sinistre, gestionnaire: gestionnaire, date_traitement: new Date().toISOString().split('T')[0] },
        { onConflict: 'ref_sinistre', ignoreDuplicates: true }
      );
    }
  }
  
  showNotif(checked ? '✅ Dossier marqué traité' : '↩️ Dossier remis en cours', 'success');
  allDossiers = allDossiers.map(d => d.id === id ? {...d, traite: checked, statut: newStatut} : d);
}

      return (!d.gestionnaire || d.gestionnaire === '') && !d.verrouille && isLibre;
    });
    const enAttenteDispatch = allDossiers.filter(function(d) { return d.verrouille && (!d.statut || d.statut === 'nonattribue'); }).length;
    if (dispo.length === 0) {

        var okTp = types.length === 0 || types.some(function(t){ return dTp.includes(t); });
        return okPf && okTp;
      });

    if (dispoHabilite.length === 0) {

async function saveAllHabilitations() {
    var gests = allUsers.filter(function(u) {
        return ['gestionnaire','manager','admin'].includes(u.role);
    });
    var errors = 0;
    for (var i = 0; i < gests.length; i++) {
        var g = gests[i];
        var hab = { portefeuille: [], type: [], nature: [] };
        var modal = document.getElementById('hab-modal');
        modal.querySelectorAll('.hab-cb[data-uid="' + g.id + '"]:checked').forEach(function(cb) {
            hab[cb.dataset.cat].push(cb.value);
        });
        var result = await db.from('habilitation_gestionnaires')
            .upsert({ user_id: g.id, portefeuille: hab.portefeuille, type: hab.type, nature: hab.nature, updated_at: new Date().toISOString() }, { onConflict: 'user_id' });
        if (result.error) errors++;
    }
    closeModal('hab-modal');
    if (errors === 0) {
        showNotif('Habilitations enregistrees !', 'success');
        await auditLog('HAB_UPDATE', 'Habilitations modifiees');
    } else {
        showNotif(errors + ' erreur(s) sauvegarde', 'error');
    }
}

async function showPropositionModal() {
    await loadDossiers();
    await loadAllUsers();
    var res = await db.from('habilitation_gestionnaires').select('*');
    var habMap = {};
    if (res.data) res.data.forEach(function(h) { habMap[String(h.user_id)] = h; });

    // Charger historique référents pour pré-assignation intelligente
    var resHistoProp = await db.from('historique_sinistres').select('ref_sinistre, gestionnaire, date_traitement');
    var histoPropMap = {};
    if (resHistoProp.data) resHistoProp.data.forEach(function(h){ histoPropMap[h.ref_sinistre] = h; });
    var resFlagProp = await db.from('app_config').select('value').eq('key','historique_actif').maybeSingle();
    var histoPropActif = !resFlagProp.data || resFlagProp.data.value !== 'false';

    var activeIds = JSON.parse(safeSession.getItem('dispatch_gestionnaires') || '[]');
    var activeGest = (allUsers||[]).filter(function(u) { return activeIds.includes(String(u.id)); });

    // Dossiers libres — pré-triés : OPTINEO + HABITATION/MRH + BDG en priorité absolue
    function _priScore(d) {
        var pf  = (d.portefeuille||'').toUpperCase();
        var tp  = (d.type||'').toUpperCase();
        var nat = (d.nature||'').toUpperCase();
        var score = 0;
        if (pf.includes('OPTINEO'))                          score += 4;
        if (tp.includes('HABITATION') || tp.includes('MRH')) score += 2;
        if (nat.includes('BDG'))                             score += 1;
        return score;
    }
    var dossiersLibres = (allDossiers||[]).filter(function(d) {
        var s = (d.statut||'').toLowerCase();
        return s === 'nonattribue' || s === '' || !d.gestionnaire || d.gestionnaire === '';
    }).sort(function(a, b) {
        return _priScore(b) - _priScore(a); // score décroissant = priorités d'abord
    });

    var modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.id = 'proposition-modal';
    modal.style.zIndex = 4000;

    var usedIds = [];
    var propData = {};

    // ── PRÉ-ASSIGNATION HISTORIQUE ─────────────────────────────
    var dossiersPreAssignes = {};
    var idsPreAssignes = [];
    if (histoPropActif) {
      dossiersLibres.forEach(function(d) {
        var hEntry = histoPropMap[d.ref_sinistre];
        if (!hEntry) return;
        var refGest = activeGest.find(function(g) {
          return (g.prenom + ' ' + g.nom) === hEntry.gestionnaire;
        });
        if (!refGest) return;
        var hab2 = habMap[String(refGest.id)];
        var pf2  = hab2 ? (hab2.portefeuille && hab2.portefeuille.length > 0 ? hab2.portefeuille.map(function(x){ return (x+'').toUpperCase().trim(); }) : []) : null;
        var tp2  = hab2 ? (hab2.type && hab2.type.length > 0 ? hab2.type.map(function(x){ return (x+'').toUpperCase().trim(); }) : []) : null;
        var nat2 = hab2 ? (hab2.nature && hab2.nature.length > 0 ? hab2.nature.map(function(x){ return (x+'').toUpperCase().trim(); }) : []) : null;
        var okPf2  = !pf2  || pf2.length  === 0 || pf2.some(function(p){ return (d.portefeuille||'').toUpperCase().includes(p); });
        var okTp2  = !tp2  || tp2.length  === 0 || tp2.some(function(p){ return (d.type||'').toUpperCase().includes(p); });
        var okNat2 = !nat2 || nat2.length === 0 || nat2.some(function(p){ return (d.nature||'').toUpperCase().includes(p); });
        if (!okPf2 || !okTp2 || !okNat2) return;
        if (!dossiersPreAssignes[String(refGest.id)]) dossiersPreAssignes[String(refGest.id)] = [];
        dossiersPreAssignes[String(refGest.id)].push(d);
        idsPreAssignes.push(d.id);
      });

        var pf  = hab
                    ? (hab.portefeuille && hab.portefeuille.length > 0
                        ? hab.portefeuille.map(function(x){ return (x+'').toUpperCase().trim(); })
                        : [])
                    : null;
        var tp  = hab
                    ? (hab.type && hab.type.length > 0
                        ? hab.type.map(function(x){ return (x+'').toUpperCase().trim(); })
                        : [])
                    : null;
        var nat = hab

                        : [])
                    : null;

        // dossiersLibres déjà triés MRH/BDG globalement — filtrer par habilitation
        var eligible = dossiersLibres.filter(function(d) {

            var dPf  = (d.portefeuille||'').toUpperCase().trim();

        }).slice(0, 10);

        eligible.forEach(function(d) { usedIds.push(d.id); });
        // Fusionner pré-assignés (en tête) + éligibles normaux
        var preA = dossiersPreAssignes[String(g.id)] || [];
        var eligibleIds = eligible.map(function(d){ return d.id; });

                + '</div>';

        if (prop.dossiers.length === 0) {
            dLines = '<div style="padding:12px;text-align:center;color:var(--gray-600);font-size:13px">⚠️ Aucun dossier éligible pour les habilitations de ce gestionnaire</div>';

            + '<div><strong style="color:var(--navy)">' + g.prenom + ' ' + g.nom + '</strong>'
            + ' <span style="font-size:11px;color:var(--gray-600);background:var(--gray-100);padding:2px 8px;border-radius:10px">' + prop.dossiers.length + ' dossier(s)</span></div>'
            + '<div style="display:flex;align-items:center;gap:6px">'
            + '<label style="font-size:12px;color:var(--gray-600)">Max :</label>'
            + '<input type="number" class="nb-dossiers-input" data-gestid="' + g.id + '" value="10" min="1" max="50" style="width:55px;padding:4px 6px;border:1px solid var(--gray-300);border-radius:6px;text-align:center;font-size:13px">'
            + '</div></div>'
            + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:6px 8px;background:#f0f4f8;border-radius:8px">'

            + '<span style="font-size:12px;color:var(--gray-600)">Tout sélectionner</span>'
            + '<span style="flex:1"></span>'
            + '<select class="bulk-move-sel" data-gestid="' + g.id + '" style="font-size:11px;padding:3px 6px;border:1px solid var(--gray-300);border-radius:6px;display:none"><option value="">↔️ Déplacer vers...</option>' + activeGest.map(function(og){ return '<option value="' + og.id + '|' + og.prenom + ' ' + og.nom + '">' + og.prenom + ' ' + og.nom + '</option>'; }).join('') + '</select>'

    // Logique déplacer un dossier vers un autre gestionnaire
    function bindMoveSelects() {
        modal.querySelectorAll('[data-dossier-move]').forEach(function(sel) {
            sel.onchange = function() {
                var targetGestId = this.value;
                if (!targetGestId) return;
                var row = this.closest('[data-dossier-id]');

                var targetBlock = modal.querySelector('.dossiers-list-block[data-gestid="' + targetGestId + '"]');

                this.setAttribute('data-current-gest', targetGestId);

            block.querySelectorAll('.dossier-sel-cb').forEach(function(c) { c.checked = cb.checked; });
            updateBulkBar(gestid);
        });
    });

    // Mise à jour de la barre d'actions groupées selon sélection
    function updateBulkBar(gestid) {
        var block = modal.querySelector('.dossiers-list-block[data-gestid="' + gestid + '"]');
        var selected = block ? block.querySelectorAll('.dossier-sel-cb:checked').length : 0;
        var moveBtn = modal.querySelector('.bulk-move-sel[data-gestid="' + gestid + '"]');
        var rmBtn   = modal.querySelector('.bulk-rm-btn[data-gestid="' + gestid + '"]');
        if (moveBtn) moveBtn.style.display = selected > 0 ? '' : 'none';
        if (rmBtn)   rmBtn.style.display   = selected > 0 ? '' : 'none';
    }

    // Afficher la barre quand une case est cochée
    modal.addEventListener('change', function(e) {
        if (e.target.classList.contains('dossier-sel-cb')) {
            var gestid = e.target.dataset.gestId;
            // Chercher le gestid dans la ligne parente
            var block = e.target.closest('.dossiers-list-block');
            if (block) updateBulkBar(block.dataset.gestid);
        }
    });

    // ── SUPPRESSION EN MASSE ──────────────────────────────────────────
    modal.querySelectorAll('.bulk-rm-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var gestid = this.dataset.gestid;
            var block = modal.querySelector('.dossiers-list-block[data-gestid="' + gestid + '"]');
            block.querySelectorAll('.dossier-sel-cb:checked').forEach(function(cb) {
                var row = cb.closest('[data-dossier-id]');
                if (row) row.remove();
            });
            modal.querySelector('.sel-all-block[data-gestid="' + gestid + '"]').checked = false;
            updateBulkBar(gestid);
        });
    });

    // ── DÉPLACEMENT EN MASSE ─────────────────────────────────────────
    modal.querySelectorAll('.bulk-move-sel').forEach(function(sel) {
        sel.addEventListener('change', function() {
            if (!this.value) return;
            var parts = this.value.split('|');
            var targetGestId = parts[0];
            var gestid = this.dataset.gestid;
            if (targetGestId === gestid) { this.value = ''; return; }
            var block  = modal.querySelector('.dossiers-list-block[data-gestid="' + gestid + '"]');
            var target = modal.querySelector('.dossiers-list-block[data-gestid="' + targetGestId + '"]');
            if (!target) { this.value = ''; return; }
            block.querySelectorAll('.dossier-sel-cb:checked').forEach(function(cb) {
                var row = cb.closest('[data-dossier-id]');
                if (row) { cb.checked = false; target.appendChild(row); }
            });
            this.value = '';
            updateBulkBar(gestid);
            updateBulkBar(targetGestId);
            modal.querySelector('.sel-all-block[data-gestid="' + gestid + '"]').checked = false;
            bindMoveSelects();
        });
    });

    document.getElementById('btn-do-dispatch').onclick = async function() {
        // Animation pendant le dispatch
        var btnDispatch = this;
        btnDispatch.disabled = true;
        btnDispatch.innerHTML = '<span style="display:inline-block;animation:spin 0.8s linear infinite">⏳</span> Dispatch en cours...';
        btnDispatch.style.opacity = '0.8';
        var assignments = [];
        var warnings = [];
        activeGest.forEach(function(g) {
            var nb = parseInt((document.querySelector('.nb-dossiers-input[data-gestid="' + g.id + '"]')||{}).value) || 10;
            var rows = Array.from(document.querySelectorAll('.dossiers-list-block[data-gestid="' + g.id + '"] [data-dossier-id]')).slice(0, nb);
            var nom = g.prenom + ' ' + g.nom;
            if (rows.length < nb) {
                warnings.push(nom + ' : ' + rows.length + '/' + nb + ' dossier(s) seulement');
            }
            rows.forEach(function(el) {
                assignments.push({ dossierId: el.dataset.dossierId, nom: nom });
            });
        });
        if (warnings.length > 0) {
            var msg = '⚠️ Certains gestionnaires n\'ont pas reçu le nombre demandé :\n' + warnings.join('\n');
            if (!confirm(msg + '\n\nContinuer quand même ?')) {
                btnDispatch.disabled = false;
                btnDispatch.innerHTML = '✅ DISPATCH';
                btnDispatch.style.opacity = '';
                return;
            }
        }
        var ok = 0;
        for (var i = 0; i < assignments.length; i++) {
            var a = assignments[i];
            var r = await db.from('dossiers').update({
                gestionnaire: a.nom,
                statut: 'attribue',
                verrouille: true,
                dispatched_at: new Date().toISOString()
            }).eq('id', a.dossierId);
            if (!r.error) ok++;
        }
        closeModal('proposition-modal');
        showNotif(ok + ' dossier(s) dispatchés avec succès !', 'success');
        await auditLog('DISPATCH', ok + ' dossiers - dispatch intelligent');
        await loadDossiers();
        renderDashboard();
        // ── Alerte dossiers prioritaires non attribués ──
        checkPrioritairesNonAttribues(activeGest, habMap, histoPropMap, histoPropActif);
    };
}

// ===== ALERTE PRIORITAIRES NON ATTRIBUÉS =====
async function checkPrioritairesNonAttribues(activeGest, habMap, histoPropMap, histoPropActif) {
    await loadDossiers();
    var PRIORITAIRES_ATTR = ['OPTINEO'];
    var PRIORITAIRES_TYPE = ['MRH', 'HABITATION'];
    var PRIORITAIRES_NAT  = ['BRIS DE GLACE', 'BDG'];

    function _isPrio(d) {
        var pf  = (d.portefeuille||'').toUpperCase();
        var tp  = (d.type||'').toUpperCase();
        var nat = (d.nature_label||d.nature||'').toUpperCase();
        var hasRef = histoPropActif && histoPropMap && histoPropMap[d.ref_sinistre];
        return PRIORITAIRES_ATTR.some(function(x){ return pf.includes(x); })
            || PRIORITAIRES_TYPE.some(function(x){ return tp.includes(x); })
            || PRIORITAIRES_NAT.some(function(x){ return nat.includes(x); })
            || hasRef;
    }

    var nonAttribuesPrio = (allDossiers||[]).filter(function(d) {
        var s = (d.statut||'').toLowerCase();
        var estLibre = s === 'nonattribue' || s === '' || !d.gestionnaire || d.gestionnaire === '';
        return estLibre && _isPrio(d);
    });

    if (nonAttribuesPrio.length === 0) return;

    // Détecter les motifs pour chaque dossier
    function getMotif(d) {
        var hasRef = histoPropActif && histoPropMap && histoPropMap[d.ref_sinistre];
        if (hasRef) {
            var refGestNom = histoPropMap[d.ref_sinistre].gestionnaire;
            var refGestActif = (activeGest||[]).some(function(g){ return (g.prenom+' '+g.nom) === refGestNom; });
            if (!refGestActif) return '👤 Référent (<strong>' + refGestNom + '</strong>) non sélectionné pour ce dispatch';
        }
        // Vérifier si un gestionnaire habilité existe dans activeGest
        var habiliteExiste = (activeGest||[]).some(function(g) {
            var hab = habMap ? habMap[String(g.id)] : null;
            if (!hab) return true; // pas de fiche = pas de restriction
            var pf  = hab.portefeuille && hab.portefeuille.length > 0 ? hab.portefeuille.map(function(x){ return (x+'').toUpperCase(); }) : null;
            var tp  = hab.type && hab.type.length > 0 ? hab.type.map(function(x){ return (x+'').toUpperCase(); }) : null;
            var okPf = !pf || pf.some(function(p){ return (d.portefeuille||'').toUpperCase().includes(p); });
            var okTp = !tp || tp.some(function(p){ return (d.type||'').toUpperCase().includes(p); });
            return okPf && okTp;
        });
        if (!habiliteExiste) return '🚫 Aucun gestionnaire habilité pour ce type de dossier';
        return '⚠️ Capacité maximale atteinte pour tous les gestionnaires habilités';
    }

    var rows = nonAttribuesPrio.map(function(d) {
        var pf  = (d.portefeuille||'');
        var ref = d.ref_sinistre||'';
        var nat = d.nature_label||d.nature||'';
        var motif = getMotif(d);
        return '<tr style="border-bottom:1px solid #eee">'
            + '<td style="padding:8px 10px;font-weight:600">' + ref + '</td>'
            + '<td style="padding:8px 10px">' + pf + '</td>'
            + '<td style="padding:8px 10px">' + nat + '</td>'
            + '<td style="padding:8px 10px;font-size:12px">' + motif + '</td>'
            + '<td style="padding:8px 10px;text-align:center">'
            + '<button class="btn btn-warning" style="font-size:11px;padding:4px 8px" onclick="forceAttribuerPrioritaire(' + d.id + ', this)">🔧 Forcer</button>'
            + '</td></tr>';
    }).join('');

    var modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.id = 'prio-alert-modal';
    modal.style.zIndex = 5000;
    modal.innerHTML = '<div class="modal" style="max-width:960px;width:95vw;padding:28px">'
        + '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">'
        + '<div style="font-size:36px">⚠️</div>'
        + '<div><h2 style="color:#e74c3c;margin:0">' + nonAttribuesPrio.length + ' dossier(s) prioritaire(s) non attribué(s)</h2>'
        + '<p style="color:#666;font-size:13px;margin:4px 0 0">Ces dossiers nécessitent une attention immédiate.</p></div></div>'
        + '<div style="overflow-x:auto;border:1px solid #eee;border-radius:8px">'
        + '<table style="width:100%;border-collapse:collapse;font-size:13px">'
        + '<thead><tr style="background:#f8f9fa"><th style="padding:8px 10px;text-align:left">Réf.</th>'
        + '<th style="padding:8px 10px;text-align:left">Portefeuille</th>'
        + '<th style="padding:8px 10px;text-align:left">Nature</th>'
        + '<th style="padding:8px 10px;text-align:left">Motif</th>'
        + '<th style="padding:8px 10px">Action</th></tr></thead>'
        + '<tbody>' + rows + '</tbody></table></div>'
        + '<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">'
        + '<button class="btn btn-secondary" onclick="closeModal(&quot;prio-alert-modal&quot;)">Ignorer pour l&apos;instant</button>'
        + '<button class="btn btn-primary" onclick="closeModal(&quot;prio-alert-modal&quot;)">✅ Valider</button>'
        + '</div></div>';
    document.body.appendChild(modal);
}

async function doForceAttribution(dossierId) {

    if (!nom) return;
    var r = await db.from('dossiers').update({ gestionnaire: nom, statut: 'attribue', verrouille: true }).eq('id', dossierId);
    if (r.error) { showNotif('Erreur : ' + r.error.message, 'error'); return; }
    await auditLog('FORCE_ATTRIBUTION_PRIORITAIRE', 'Dossier ' + dossierId + ' forcé vers ' + nom);
