  <!-- Ticket 7 - Cache busting via version check -->
  <script>
    const APP_VERSION = '2.5.58';
    var storedVersion = null; try { storedVersion = sessionStorage.getItem('dispatchis_version'); } catch(e) {}
    if (storedVersion && storedVersion !== APP_VERSION) {
      sessionStorage.setItem('dispatchis_version', APP_VERSION);
      window.location.href = window.location.href.split('?')[0] + '?v=' + APP_VERSION;
    } else {
      sessionStorage.setItem('dispatchis_version', APP_VERSION);
    }
  </script>
