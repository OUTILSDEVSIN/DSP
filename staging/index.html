<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:,">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dispatchis</title>
  <meta name="copyright" content="© Dispatchis — Tous droits réservés">
  <meta name="version" content="2.5.58">

  <!-- Librairies externes -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/dplane.css">
  <link rel="stylesheet" href="css/trocs.css">
  <link rel="stylesheet" href="css/dvol.css">

  <!-- Cache busting via version check — FIX: évite boucle infinie si sessionStorage bloqué -->
  <script>
    const APP_VERSION = '2.5.58';
    (function() {
      try {
        var stored = sessionStorage.getItem('dispatchis_version');
        if (stored && stored !== APP_VERSION) {
          sessionStorage.setItem('dispatchis_version', APP_VERSION);
          var base = window.location.href.split('?')[0];
          // FIX: on vérifie qu'on ne boucle pas (pas déjà ?v= dans l'URL)
          if (!window.location.search.includes('v=')) {
            window.location.replace(base + '?v=' + APP_VERSION);
          }
        } else {
          sessionStorage.setItem('dispatchis_version', APP_VERSION);
        }
      } catch(e) { /* sessionStorage inaccessible — silencieux */ }
    })();
  </script>
</head>

<body>

<!-- ===== STAGING BANNER ===== -->
<div id="staging-banner">
  <span style="font-size:16px;">⚠️</span>
  <span>ENVIRONNEMENT STAGING — Base de données de TEST — Ne pas utiliser en production</span>
  <span style="font-size:16px;">⚠️</span>
</div>
<!-- ===== FIN STAGING BANNER ===== -->


<!-- ===== ÉCRAN DE CONNEXION ===== -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">D</div>
      <div class="login-logo-name">Dispatch<span>is</span></div>
    </div>
    <p class="login-subtitle">Espace collaborateurs · Accès sécurisé</p>

    <form id="login-form" onsubmit="event.preventDefault(); doLogin()">
      <div class="form-group">
        <label for="login-email">Adresse email</label>
        <input type="email" id="login-email" placeholder="votre@email.fr" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="login-password">Mot de passe</label>
        <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div id="login-error" class="login-error" style="display:none;">Email ou mot de passe incorrect.</div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn">Se connecter</button>
    </form>
    <p class="login-footer">© Dispatchis — Accès réservé aux collaborateurs</p>
  </div>
</div>


<!-- ===== APP PRINCIPALE ===== -->
<div id="app-screen" style="display:none;">

  <!-- HEADER -->
  <header id="main-header">
    <div class="header-left">

      <!-- Logo compact -->
      <div class="header-logo">
        <span class="header-logo-icon">D</span>
        <span class="header-logo-name">Dispatch<span>is</span></span>
      </div>

      <!-- Tool Switcher — FIX: onclick sécurisé, appel conditionnel -->
      <div class="tool-switcher">
        <button id="btn-tool-dispatch" class="tool-btn active" onclick="if(typeof switchTool==='function') switchTool('dispatch')">
          📋 Dispatch
        </button>
        <button id="btn-tool-dplane" class="tool-btn" onclick="if(typeof switchTool==='function') switchTool('dplane')">
          📅 Dplane
        </button>
        <button id="btn-tool-dvol" class="tool-btn" onclick="if(typeof switchTool==='function') switchTool('dvol')">
          🚗 Dvol
        </button>
      </div>

    </div>

    <div class="header-right">

      <!-- Mode sombre -->
      <button id="dark-toggle-btn" class="btn-header" onclick="if(typeof toggleDarkMode==='function') toggleDarkMode()" title="Mode sombre">🌙</button>

      <div class="header-sep"></div>

      <!-- Nom + rôle utilisateur -->
      <span id="header-name" class="header-username"></span>
      <span id="header-role" class="header-role-tag"></span>

      <div class="header-sep"></div>

      <!-- Bouton Mode test (God Switch — admin Julien uniquement) -->
      <button id="btn-god-switch" class="btn-header" style="display:none;" onclick="if(typeof toggleGodMode==='function') toggleGodMode()" title="Mode test">🧪 Mode test</button>

      <!-- Bouton Réinitialiser (admin/manager uniquement) -->
      <button id="btn-reset-header" class="btn-header btn-header-danger" style="display:none;" onclick="if(typeof showResetMenu==='function') showResetMenu()" title="Réinitialiser">⚙️ Réinitialiser</button>

      <!-- Bouton Changer mot de passe -->
      <button class="btn-header" onclick="if(typeof showChangePassword==='function') showChangePassword()" title="Changer mon mot de passe">🔑 Mot de passe</button>

      <!-- Bouton Déconnexion -->
      <button class="btn-header btn-header-danger" onclick="if(typeof doLogout==='function') doLogout()">⏻ Déconnexion</button>

    </div>
  </header>

  <!-- ===== DISPATCH SCREEN ===== -->
  <div id="dispatch-screen">
    <div id="tabs-container" class="tabs"></div>
    <div id="main-content" class="main-content"></div>
  </div>

  <!-- ===== DPLANE SCREEN ===== -->
  <div id="dplane-screen" style="display:none;">
    <div id="dplane-container"></div>
  </div>

  <!-- ===== DVOL SCREEN ===== -->
  <div id="dvol-screen" style="display:none;">
    <div id="dvol-container"></div>
  </div>

</div>
<!-- ===== FIN APP ===== -->


<!-- ===== SCRIPTS — ordre de dépendance strict ===== -->
<!-- 1. Config Supabase (db, SUPABASE_URL, SUPABASE_KEY) -->
<script src="js/config.js"></script>
<!-- 2. Utilitaires globaux (safeSession, safeLocal, toggleDarkMode) -->
<script src="js/utils.js"></script>
<!-- 3. Auth (doLogin, doLogout, currentUser, currentUserData) -->
<script src="js/auth.js"></script>
<!-- 4. Core (switchTool, showTab, buildTabs, renderDashboard...) -->
<script src="js/core.js"></script>
<!-- 5. Users (renderUtilisateurs, loadAllUsers...) -->
<script src="js/users.js"></script>
<!-- 6. Dispatchis — module principal dispatch -->
<script src="js/dispatchis.js"></script>
<!-- 7. Dplane — module planning -->
<script src="js/dplane.js"></script>
<!-- 8. Dvol data — fonctions pures Supabase (doit être avant dvol-ui) -->
<script src="js/dvol.js"></script>
<!-- 9. Dvol UI — rendu interface (dépend de dvol.js) -->
<script src="js/dvol-ui.js"></script>
<!-- 10. Trocs — module trocs -->
<script src="js/trocs.js"></script>

<!-- Init dark mode après DOMContentLoaded -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    if (typeof initDarkMode === 'function') initDarkMode();
  });
</script>

</body>
</html>
